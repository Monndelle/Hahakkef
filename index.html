<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESC Scoreboard Pro V3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --blue: #0a1931; --gold: #c8a45e; --grad: linear-gradient(90deg, #0a1931 0%, #185adb 100%); }
        body { background: #050a18; color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .view { display: none; padding: 15px; flex-direction: column; align-items: center; }
        .active { display: flex; }
        
        /* Header & Banner */
        .app-header { background: black; padding: 15px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; width: 100%; box-sizing: border-box; }
        .user-banner { width: 100%; max-width: 500px; background: black; display: flex; align-items: center; padding: 10px; margin-bottom: 15px; clip-path: polygon(0 0, 100% 0, 95% 100%, 0% 100%); }
        .user-logo { width: 45px; height: 45px; background: #e60000; color: white; border-radius: 5px; font-size: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; text-align: center; margin-right: 15px; }

        /* Eingabe-Panel (Der Kern!) */
        .input-panel { background: #111; padding: 15px; width: 100%; max-width: 480px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        input, button { padding: 12px; border-radius: 5px; border: none; }
        input { background: #222; color: white; border: 1px solid #444; }
        .btn-main { background: var(--gold); color: black; font-weight: bold; cursor: pointer; }

        /* Listen Styling */
        #ranking-list, #final-list { list-style: none; padding: 0; width: 100%; max-width: 500px; }
        .item-container { position: relative; margin-bottom: 8px; }
        .item { background: var(--grad); display: flex; align-items: center; height: 90px; position: relative; z-index: 2; transition: 0.3s; }
        .item.slid { transform: translateX(-80px); }
        .edit-side { position: absolute; right: 0; top: 0; height: 100%; width: 80px; background: var(--gold); color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }

        /* Rauten-Flaggen */
        .diamond { width: 50px; height: 50px; background: #333; transform: rotate(45deg); overflow: hidden; border: 2px solid #666; margin-left: 15px; flex-shrink: 0; }
        .diamond img { width: 150%; height: 150%; transform: rotate(-45deg); object-fit: cover; }

        .info { flex-grow: 1; margin-left: 25px; }
        .info b { display: block; text-transform: uppercase; color: var(--gold); letter-spacing: 1px; }
        .info span { font-size: 0.85rem; opacity: 0.8; }

        /* Artist Box & Play Button */
        .artist-box { width: 110px; height: 100%; position: relative; clip-path: polygon(20% 0, 100% 0, 100% 100%, 0% 100%); background: #000; }
        .artist-box img { width: 100%; height: 100%; object-fit: cover; }
        .play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); color: white; text-decoration: none; font-size: 1.5rem; }

        /* Final View Points */
        .pts-badge { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 15px; background: rgba(0,0,0,0.5); }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: black; border-top: 2px solid var(--gold); display: flex; justify-content: space-around; padding: 10px 0; }
        .nav-item { color: white; background: none; border: none; font-weight: bold; opacity: 0.6; }
        .nav-item.active-nav { opacity: 1; color: var(--gold); }
    </style>
</head>
<body>

<div class="app-header">
    <div style="font-weight:bold">2026 EUROVISION</div>
    <div class="user-logo">SIMON<br>ESC</div>
</div>

<div id="view-ranking" class="view active">
    <div class="input-panel">
        <input type="hidden" id="edit-id">
        <input type="text" id="in-country" placeholder="Land">
        <input type="text" id="in-artist" placeholder="Künstler">
        <input type="text" id="in-song" placeholder="Songname">
        <input type="text" id="in-yt" placeholder="YouTube Link">
        <input type="file" id="in-file" accept="image/*" style="font-size: 0.7rem;">
        <button class="btn-main" onclick="saveSong()">SONG SPEICHERN</button>
        <button onclick="resetToAlpha()" style="background:#444; color:white;">RESET TO ALPHABETICAL</button>
    </div>
    
    <ul id="ranking-list"></ul>
    
    <button class="btn-main" style="width:100%; max-width:500px; background:#4caf50; color:white; margin-top:20px; border-radius:30px;" onclick="showFinal()">SAVE MY TOP</button>
</div>

<div id="view-final" class="view">
    <div class="user-banner">
        <div class="user-logo">SIMON<br>ESC</div>
        <b style="font-size:1.2rem; margin-left:10px;">SimonESC</b>
    </div>
    <ul id="final-list"></ul>
    <button class="btn-main" style="width:100%; max-width:500px; background:#4caf50; color:white; border-radius:30px;" onclick="goBack()">EDIT MY TOP</button>
</div>

<div class="nav-bar">
    <button class="nav-item active-nav" onclick="location.reload()">HOME</button>
    <button class="nav-item" onclick="showView('view-ranking')">MY TOP</button>
</div>

<script>
    let songs = JSON.parse(localStorage.getItem('esc_core_v1') || '[]');
    const pts = [12, 10, 8, 7, 6, 5, 4, 3, 2, 1];
    let startX = 0;

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'view-final') renderFinal();
    }

    async function saveSong() {
        const id = document.getElementById('edit-id').value;
        const file = document.getElementById('in-file').files[0];
        let imgData = "https://via.placeholder.com/110";

        if(file) {
            imgData = await new Promise(r => {
                const reader = new FileReader();
                reader.onload = () => r(reader.result);
                reader.readAsDataURL(file);
            });
        }

        const newSong = {
            id: id ? parseInt(id) : Date.now(),
            country: document.getElementById('in-country').value,
            artist: document.getElementById('in-artist').value,
            song: document.getElementById('in-song').value,
            yt: document.getElementById('in-yt').value,
            img: id ? (songs.find(s => s.id == id).img) : imgData
        };
        
        if(file) newSong.img = imgData;

        if(id) {
            const idx = songs.findIndex(s => s.id == id);
            songs[idx] = newSong;
        } else {
            songs.push(newSong);
        }

        localStorage.setItem('esc_core_v1', JSON.stringify(songs));
        clearInputs();
        renderRanking();
    }

    function renderRanking() {
        const list = document.getElementById('ranking-list');
        list.innerHTML = '';
        songs.forEach(s => {
            const container = document.createElement('div');
            container.className = 'item-container';
            container.innerHTML = `
                <div class="edit-side" onclick="editSong(${s.id})">EDIT</div>
                <div class="item" ontouchstart="startX=event.touches[0].clientX" ontouchmove="handleSlide(this, event)">
                    <div class="diamond"><img src="https://flagcdn.com/w160/${getCode(s.country)}.png"></div>
                    <div class="info"><b>${s.country}</b><span>${s.artist}</span></div>
                    <div class="artist-box">
                        <img src="${s.img}">
                        ${s.yt ? `<a href="${s.yt}" target="_blank" class="play-overlay">▶</a>` : ''}
                    </div>
                </div>`;
            list.appendChild(container);
        });
    }

    function handleSlide(el, e) {
        let diff = startX - e.touches[0].clientX;
        if(diff > 40) el.classList.add('slid');
        if(diff < -40) el.classList.remove('slid');
    }

    function editSong(id) {
        const s = songs.find(x => x.id === id);
        document.getElementById('edit-id').value = s.id;
        document.getElementById('in-country').value = s.country;
        document.getElementById('in-artist').value = s.artist;
        document.getElementById('in-song').value = s.song;
        document.getElementById('in-yt').value = s.yt;
        window.scrollTo(0,0);
    }

    function resetToAlpha() {
        songs.sort((a,b) => a.country.localeCompare(b.country));
        localStorage.setItem('esc_core_v1', JSON.stringify(songs));
        renderRanking();
    }

    function showFinal() { showView('view-final'); }
    function goBack() { showView('view-ranking'); }

    function renderFinal() {
        const list = document.getElementById('final-list');
        list.innerHTML = '';
        songs.forEach((s, i) => {
            list.innerHTML += `
                <div class="item" style="margin-bottom:5px; background:${i<3 ? 'linear-gradient(90deg, #c8a45e, #0a1931)' : 'var(--grad)'}">
                    <div style="width:30px; text-align:right; font-weight:bold; margin-right:10px">${i+1}</div>
                    <div class="diamond" style="width:35px; height:35px;"><img src="https://flagcdn.com/w160/${getCode(s.country)}.png"></div>
                    <div class="info"><b>${s.country}</b></div>
                    <div class="pts-badge">${pts[i] || ''}</div>
                </div>`;
        });
    }

    function getCode(c) {
        const m = {"Germany":"de","Croatia":"hr","Finland":"fi","Albania":"al","Ukraine":"ua","Austria":"at","Sweden":"se","Denmark":"dk"};
        return m[c] || "un";
    }

    function clearInputs() {
        document.querySelectorAll('.input-panel input').forEach(i => i.value = '');
    }

    new Sortable(document.getElementById('ranking-list'), {
        animation: 150,
        onEnd: () => {
            const names = Array.from(document.querySelectorAll('#ranking-list .info b')).map(b => b.innerText);
            songs.sort((a,b) => names.indexOf(a.country.toUpperCase()) - names.indexOf(b.country.toUpperCase()));
            localStorage.setItem('esc_core_v1', JSON.stringify(songs));
        }
    });

    renderRanking();
</script>
</body>
</html>
