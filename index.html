<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ESC Pro V2 Final Fixed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --blue: linear-gradient(90deg, #0a1931 0%, #185adb 100%); --gold: #c8a45e; --red: #e60000; }
        body { background: #050a18; color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; touch-action: pan-y; }
        .view { display: none; padding: 15px; flex-direction: column; align-items: center; }
        .active { display: flex; }
        .app-header { background: #000; padding: 15px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        
        /* Liste & Items */
        .show-item { width: 100%; max-width: 500px; background: var(--blue); margin: 5px 0; padding: 15px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .item-container { position: relative; margin-bottom: 8px; overflow: hidden; border-radius: 5px; background: #333; width: 100%; max-width: 500px; }
        .edit-btn { position: absolute; right: 60px; top: 0; height: 100%; width: 60px; background: var(--gold); color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 1; }
        .del-btn { position: absolute; right: 0; top: 0; height: 100%; width: 60px; background: var(--red); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 1; }
        
        .item { background: var(--blue); display: flex; align-items: center; height: 95px; position: relative; z-index: 2; transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); width: 100%; cursor: grab; }
        .item.slid { transform: translateX(-120px); }
        
        .info { flex-grow: 1; margin-left: 15px; pointer-events: none; }
        .flag { width: 55px; height: 38px; margin-left: 10px; border: 1px solid #fff; object-fit: cover; pointer-events: none; }
        .artist-img-container { width: 100px; height: 100%; background: #000; clip-path: polygon(25% 0, 100% 0, 100% 100%, 0% 100%); flex-shrink: 0; overflow: hidden; }
        .artist-img { width: 100%; height: 100%; object-fit: cover; }

        /* UI */
        .input-panel { background: #111; padding: 15px; width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 8px; box-sizing: border-box; border-radius: 8px; margin-bottom: 10px; }
        input { padding: 10px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; }
        button { cursor: pointer; border: none; font-weight: bold; border-radius: 4px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid var(--gold); z-index: 100; }
    </style>
</head>
<body>

<div class="app-header">
    <div style="font-weight:bold">SIMON ESC</div>
    <div id="header-title">Manager 2026</div>
</div>

<div id="view-shows" class="view active">
    <div class="input-panel">
        <input type="text" id="new-show-name" placeholder="Name der neuen Show...">
        <button onclick="addShow()" style="background:var(--gold); padding:12px;">SHOW ERSTELLEN</button>
    </div>
    <div id="show-container" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
</div>

<div id="view-ranking" class="view">
    <div class="input-panel">
        <input type="hidden" id="edit-id">
        <input type="text" id="in-country" placeholder="Land (z.B. Canada, Palestine)">
        <input type="text" id="in-artist" placeholder="Sänger">
        <input type="text" id="in-song" placeholder="Song Name">
        <input type="text" id="in-emoji" placeholder="Oder Emoji Flagge">
        <label style="font-size: 0.8rem; color: #aaa;">Künstlerbild wählen:</label>
        <input type="file" id="file-img" accept="image/*">
        <button id="add-btn" onclick="saveItem()" style="background:var(--gold); padding:12px;">SPEICHERN</button>
    </div>
    <ul id="ranking-list" style="list-style:none; padding:0; width:100%; display:flex; flex-direction:column; align-items:center;"></ul>
</div>

<div id="view-community" class="view">
    <div id="community-list" style="width:100%; max-width:500px;"></div>
    <div class="input-panel">
        <input type="hidden" id="c-edit-id">
        <input type="text" id="c-name" placeholder="Land">
        <input type="number" id="c-pts" placeholder="Punkte">
        <div style="display:flex; gap:10px;">
            <button id="c-add-btn" onclick="addComm()" style="background:#185adb; color:white; padding:12px; flex:2;">EINTRAGEN</button>
            <button id="c-del-btn" onclick="deleteComm()" style="background:var(--red); color:white; padding:12px; flex:1; display:none;">LÖSCHEN</button>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <button onclick="showView('view-shows')" style="background:#185adb; color:white; padding:10px;">SHOWS</button>
    <button onclick="showView('view-ranking')" style="background:#4caf50; color:white; padding:10px;">MY TOP</button>
    <button onclick="showView('view-community')" style="background:#185adb; color:white; padding:10px;">COMMUNITY</button>
</div>

<script>
    let currentShowId = null;
    let startX = 0;

    // ISO-Mapping für ALLE Flaggen (erweiterbar)
    const countryToISO = {
        "germany":"de", "croatia":"hr", "palestine":"ps", "canada":"ca", "usa":"us", "brazil":"br", 
        "uk":"gb", "israel":"il", "ukraine":"ua", "switzerland":"ch", "ireland":"ie", "italy":"it",
        "france":"fr", "spain":"es", "sweden":"se", "norway":"no", "netherlands":"nl", "finland":"fi"
    };

    function getFlagURL(country) {
        if(!country) return null;
        let c = country.trim().toLowerCase();
        let code = countryToISO[c] || c.substring(0,2); // Fallback auf erste 2 Buchstaben
        return `https://flagcdn.com/w160/${code}.png`;
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'view-community') renderComm();
        if(id === 'view-ranking') renderSongs();
    }

    // --- SHOWS ---
    function addShow() {
        const name = document.getElementById('new-show-name').value;
        if(!name) return;
        let shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        shows.push({id: Date.now(), name, songs: [], community: []});
        localStorage.setItem('esc_v3', JSON.stringify(shows));
        document.getElementById('new-show-name').value = '';
        renderShows();
    }

    function renderShows() {
        const container = document.getElementById('show-container');
        let shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        container.innerHTML = '';
        shows.forEach(s => {
            const div = document.createElement('div');
            div.className = 'show-item';
            div.innerHTML = `<b>⭐ ${s.name}</b> <span onclick="deleteShow(${s.id}, event)" style="color:red; font-weight:bold; padding:5px;">✕</span>`;
            div.onclick = () => { currentShowId = s.id; showView('view-ranking'); };
            container.appendChild(div);
        });
    }

    function deleteShow(id, e) {
        e.stopPropagation();
        if(!confirm("Show löschen?")) return;
        let shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        shows = shows.filter(s => s.id !== id);
        localStorage.setItem('esc_v3', JSON.stringify(shows));
        renderShows();
    }

    // --- RANKING (MY TOP) ---
    async function saveItem() {
        if(!currentShowId) return alert("Wähle eine Show!");
        const editId = document.getElementById('edit-id').value;
        const fileInput = document.getElementById('file-img');
        let shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        const sIdx = shows.findIndex(s => s.id === currentShowId);
        
        let imgData = editId ? shows[sIdx].songs.find(s => s.id == editId).img : 'https://via.placeholder.com/110';
        
        if(fileInput.files[0]) {
            imgData = await new Promise(r => {
                const reader = new FileReader();
                reader.onload = () => r(reader.result);
                reader.readAsDataURL(fileInput.files[0]);
            });
        }

        const song = {
            id: editId ? parseInt(editId) : Date.now(),
            country: document.getElementById('in-country').value,
            artist: document.getElementById('in-artist').value,
            song: document.getElementById('in-song').value,
            emoji: document.getElementById('in-emoji').value,
            img: imgData
        };

        if(editId) {
            const idx = shows[sIdx].songs.findIndex(s => s.id == editId);
            shows[sIdx].songs[idx] = song;
        } else {
            shows[sIdx].songs.push(song);
        }

        localStorage.setItem('esc_v3', JSON.stringify(shows));
        resetInputs();
        renderSongs();
    }

    function renderSongs() {
        const list = document.getElementById('ranking-list');
        let shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        const show = shows.find(s => s.id === currentShowId);
        list.innerHTML = '';
        if(!show) return;

        show.songs.forEach(s => {
            const li = document.createElement('div');
            li.className = 'item-container';
            li.dataset.id = s.id;
            
            const flagSrc = s.emoji ? `<div style="font-size:2rem; margin:10px">${s.emoji}</div>` : `<img src="${getFlagURL(s.country)}" class="flag" onerror="this.src='https://flagcdn.com/w160/un.png'">`;

            li.innerHTML = `
                <div class="edit-btn" onclick="editSong(${s.id})">EDIT</div>
                <div class="del-btn" onclick="deleteSong(${s.id})">DEL</div>
                <div class="item" 
                    ontouchstart="startX=event.touches[0].clientX" 
                    ontouchmove="handleSwipe(this, event)">
                    ${flagSrc}
                    <div class="info"><b>${s.country}</b><br>${s.artist}</div>
                    <div class="artist-img-container"><img src="${s.img}" class="artist-img"></div>
                </div>`;
            list.appendChild(li);
        });
    }

    function handleSwipe(el, e) {
        let diff = startX - e.touches[0].clientX;
        if(diff > 50) el.classList.add('slid');
        if(diff < -50) el.classList.remove('slid');
    }

    function editSong(id) {
        let shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        const s = shows.find(x => x.id === currentShowId).songs.find(x => x.id === id);
        document.getElementById('edit-id').value = s.id;
        document.getElementById('in-country').value = s.country;
        document.getElementById('in-artist').value = s.artist;
        document.getElementById('in-song').value = s.song;
        document.getElementById('in-emoji').value = s.emoji || '';
        document.getElementById('add-btn').innerText = "ÄNDERN";
        window.scrollTo(0,0);
    }

    function deleteSong(id) {
        let shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        const sIdx = shows.findIndex(s => s.id === currentShowId);
        shows[sIdx].songs = shows[sIdx].songs.filter(s => s.id !== id);
        localStorage.setItem('esc_v3', JSON.stringify(shows));
        renderSongs();
    }

    // --- COMMUNITY ---
    function addComm() {
        const id = document.getElementById('c-edit-id').value;
        const name = document.getElementById('c-name').value;
        const pts = document.getElementById('c-pts').value;
        if(!name || !pts) return;
        let shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        const sIdx = shows.findIndex(s => s.id === currentShowId);
        
        if(id) {
            const idx = shows[sIdx].community.findIndex(c => c.id == id);
            shows[sIdx].community[idx] = {id, name, pts: parseInt(pts)};
        } else {
            shows[sIdx].community.push({id: Date.now(), name, pts: parseInt(pts)});
        }
        localStorage.setItem('esc_v3', JSON.stringify(shows));
        resetComm();
        renderComm();
    }

    function renderComm() {
        const container = document.getElementById('community-list');
        let shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        const show = shows.find(s => s.id === currentShowId);
        container.innerHTML = '';
        if(show) show.community.sort((a,b)=>b.pts-a.pts).forEach((c,i)=> {
            const d = document.createElement('div');
            d.style = "display:flex; padding:12px; background:#0a1931; border-bottom:1px solid #185adb; align-items:center;";
            d.innerHTML = `<b>${i+1}</b><span style="flex:1; margin-left:15px;">${c.name}</span><b>${c.pts}</b>`;
            d.onclick = () => {
                document.getElementById('c-edit-id').value = c.id;
                document.getElementById('c-name').value = c.name;
                document.getElementById('c-pts').value = c.pts;
                document.getElementById('c-add-btn').innerText = "ÄNDERN";
                document.getElementById('c-del-btn').style.display = "block";
            };
            container.appendChild(d);
        });
    }

    function deleteComm() {
        const id = document.getElementById('c-edit-id').value;
        let shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        const sIdx = shows.findIndex(s => s.id === currentShowId);
        shows[sIdx].community = shows[sIdx].community.filter(c => c.id != id);
        localStorage.setItem('esc_v3', JSON.stringify(shows));
        resetComm();
        renderComm();
    }

    // --- UTILS ---
    function resetInputs() {
        document.getElementById('edit-id').value = '';
        document.getElementById('add-btn').innerText = "SPEICHERN";
        document.querySelectorAll('#view-ranking input').forEach(i => i.value='');
    }
    function resetComm() {
        document.getElementById('c-edit-id').value = '';
        document.getElementById('c-name').value = '';
        document.getElementById('c-pts').value = '';
        document.getElementById('c-add-btn').innerText = "EINTRAGEN";
        document.getElementById('c-del-btn').style.display = "none";
    }

    new Sortable(document.getElementById('ranking-list'), {
        animation: 150,
        delay: 50, // Kleiner Delay damit Swipe nicht sofort triggert
        onEnd: () => {
            let shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
            const sIdx = shows.findIndex(s => s.id === currentShowId);
            const newOrder = Array.from(document.querySelectorAll('.item-container')).map(el => parseInt(el.dataset.id));
            shows[sIdx].songs.sort((a,b) => newOrder.indexOf(a.id) - newOrder.indexOf(b.id));
            localStorage.setItem('esc_v3', JSON.stringify(shows));
        }
    });

    renderShows();
</script>
</body>
</html>
