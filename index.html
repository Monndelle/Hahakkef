<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESC Scoreboard Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --esc-blue: linear-gradient(90deg, #0a1931 0%, #185adb 100%); --esc-gold: #c8a45e; }
        body { background-color: #050a18; color: white; font-family: 'Trebuchet MS', sans-serif; margin: 0; padding-bottom: 80px; }
        .view { display: none; padding: 15px; flex-direction: column; align-items: center; }
        .active { display: flex; }
        
        /* Header wie im Bild */
        .app-header { width: 100%; background: black; padding: 15px; border-bottom: 2px solid var(--esc-gold); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .user-badge { display: flex; align-items: center; gap: 10px; }
        .user-logo { width: 40px; height: 40px; background: red; border-radius: 5px; font-weight: bold; font-size: 10px; text-align: center; }

        /* Listen-Navigation (Shows) */
        .show-item { width: 100%; max-width: 500px; background: var(--esc-blue); margin: 5px 0; padding: 15px; display: flex; align-items: center; cursor: pointer; border-radius: 5px; }
        .show-icon { width: 40px; margin-right: 15px; }

        /* Ranking Styles */
        #ranking-list { list-style: none; padding: 0; width: 100%; max-width: 500px; }
        .item { background: var(--esc-blue); margin-bottom: 5px; display: flex; align-items: center; height: 80px; position: relative; }
        .flag { width: 50px; height: 35px; margin-left: 10px; transform: skewX(-10deg); border: 1px solid white; object-fit: cover; }
        .info { flex-grow: 1; margin-left: 15px; overflow: hidden; }
        .info b { color: var(--esc-gold); text-transform: uppercase; display: block; }
        .points-badge { background: #185adb; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 10px; border: 2px solid rgba(255,255,255,0.5); }
        .artist-img-box { width: 80px; height: 100%; clip-path: polygon(20% 0, 100% 0, 100% 100%, 0% 100%); position: relative; }
        .artist-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .yt-btn { position: absolute; right: 25px; top: 25px; background: white; color: red; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 12px; font-weight: bold; }

        /* Community Fake View */
        .comm-item { background: #0a1931; border-bottom: 1px solid #185adb; padding: 10px; display: flex; align-items: center; width: 100%; max-width: 500px; }
        .comm-pts { margin-left: auto; color: #185adb; font-weight: bold; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: black; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid var(--esc-gold); }
        .nav-btn { background: #4caf50; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .nav-btn.blue { background: #185adb; }

        .input-panel { background: #111; padding: 10px; width: 100%; max-width: 480px; border-radius: 10px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        input { padding: 8px; background: #222; color: white; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="app-header">
    <div class="user-badge"><div class="user-logo">SIMON<br>ESC</div> <span>SimonESC</span></div>
    <div id="header-title">2026 Eurovision</div>
</div>

<div id="view-shows" class="view active">
    <h3>YEAR SELECTION / SHOWS</h3>
    <div class="input-panel">
        <input type="text" id="new-show-name" placeholder="Name der Show (z.B. Final 2026)">
        <button onclick="addShow()" style="background:var(--esc-gold)">Show hinzufügen</button>
    </div>
    <div id="show-container"></div>
</div>

<div id="view-ranking" class="view">
    <div class="input-panel">
        <input type="text" id="in-country" placeholder="Land">
        <input type="text" id="in-artist" placeholder="Sänger">
        <input type="text" id="in-yt" placeholder="YouTube Link">
        <input type="text" id="in-img" placeholder="Bild Link (URL)">
        <button onclick="addItem()" style="background:var(--esc-gold)">Song hinzufügen</button>
    </div>
    <ul id="ranking-list"></ul>
    <button class="nav-btn" onclick="saveTop()" style="margin-top:20px; width: 100%; max-width:500px;">SAVE YOUR TOP</button>
</div>

<div id="view-community" class="view">
    <h3>COMMUNITY STANDINGS</h3>
    <div class="input-panel">
        <input type="text" id="c-name" placeholder="Land">
        <input type="text" id="c-pts" placeholder="Punkte (z.B. 36006)">
        <button onclick="addComm()" style="background:var(--esc-gold)">Eintragen</button>
    </div>
    <div id="community-list" style="width:100%"></div>
</div>

<div class="bottom-nav">
    <button class="nav-btn blue" onclick="showView('view-shows')">SHOWS</button>
    <button class="nav-btn" id="edit-top-btn" onclick="showView('view-ranking')">MY TOP</button>
    <button class="nav-btn blue" onclick="showView('view-community')">COMMUNITY</button>
</div>

<script>
    let currentShowId = null;
    const pointsArr = [12, 10, 8, 7, 6, 5, 4, 3, 2, 1];

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- SHOW MANAGEMENT ---
    function addShow() {
        const name = document.getElementById('new-show-name').value;
        if(!name) return;
        const id = Date.now();
        const shows = JSON.parse(localStorage.getItem('esc_shows') || '[]');
        shows.push({id, name, songs: []});
        localStorage.setItem('esc_shows', JSON.stringify(shows));
        document.getElementById('new-show-name').value = '';
        renderShows();
    }

    function renderShows() {
        const container = document.getElementById('show-container');
        const shows = JSON.parse(localStorage.getItem('esc_shows') || '[]');
        container.innerHTML = '';
        shows.forEach(s => {
            const div = document.createElement('div');
            div.className = 'show-item';
            div.innerHTML = `<span>❤️</span> <b style="margin-left:15px">${s.name}</b>`;
            div.onclick = () => openRanking(s.id);
            container.appendChild(div);
        });
    }

    // --- RANKING MANAGEMENT ---
    function openRanking(id) {
        currentShowId = id;
        const shows = JSON.parse(localStorage.getItem('esc_shows') || '[]');
        const show = shows.find(s => s.id === id);
        document.getElementById('header-title').textContent = show.name;
        renderSongs(show.songs);
        showView('view-ranking');
    }

    function addItem() {
        const song = {
            id: Date.now(),
            country: document.getElementById('in-country').value,
            artist: document.getElementById('in-artist').value,
            yt: document.getElementById('in-yt').value,
            img: document.getElementById('in-img').value || 'https://via.placeholder.com/100'
        };
        const shows = JSON.parse(localStorage.getItem('esc_shows') || '[]');
        const show = shows.find(s => s.id === currentShowId);
        show.songs.push(song);
        localStorage.setItem('esc_shows', JSON.stringify(shows));
        renderSongs(show.songs);
    }

    function renderSongs(songs) {
        const list = document.getElementById('ranking-list');
        list.innerHTML = '';
        songs.forEach((s, i) => {
            const li = document.createElement('li');
            li.className = 'item';
            li.innerHTML = `
                <img class="flag" src="https://flagcdn.com/w80/${getFlagCode(s.country)}.png" onerror="this.src='https://via.placeholder.com/50x35?text=?'">
                <div class="info"><b>${s.country}</b><span>${s.artist}</span></div>
                <div class="points-badge">${pointsArr[i] || 0}</div>
                <div class="artist-img-box">
                    <img src="${s.img}">
                    ${s.yt ? `<a href="${s.yt}" target="_blank" class="yt-btn">▶</a>` : ''}
                </div>
            `;
            list.appendChild(li);
        });
    }

    function getFlagCode(name) {
        // Sehr einfache Map für Flaggen-Codes (Erweiterbar)
        const codes = {"Kroatien":"hr","Finnland":"fi","Schweden":"se","Bulgarien":"bg","Ukraine":"ua","Deutschland":"de"};
        return codes[name] || 'eu';
    }

    function saveTop() {
        alert("Top gespeichert! Die Reihenfolge wurde im Browser gemerkt.");
        // Hier passiert die Logik durch Sortable automatisch beim Schieben
    }

    // --- COMMUNITY FAKE ---
    function addComm() {
        const name = document.getElementById('c-name').value;
        const pts = document.getElementById('c-pts').value;
        const comm = JSON.parse(localStorage.getItem('esc_comm') || '[]');
        comm.push({name, pts});
        localStorage.setItem('esc_comm', JSON.stringify(comm));
        renderComm();
    }

    function renderComm() {
        const list = document.getElementById('community-list');
        const comm = JSON.parse(localStorage.getItem('esc_comm') || '[]');
        list.innerHTML = '';
        comm.sort((a,b) => b.pts - a.pts).forEach((c, i) => {
            list.innerHTML += `<div class="comm-item"><b>${i+1}</b> <span style="margin-left:15px">${c.name}</span> <span class="comm-pts">${c.pts}</span></div>`;
        });
    }

    new Sortable(document.getElementById('ranking-list'), {
        animation: 150,
        onEnd: () => {
            const shows = JSON.parse(localStorage.getItem('esc_shows') || '[]');
            const show = shows.find(s => s.id === currentShowId);
            const items = Array.from(document.querySelectorAll('.item .info b')).map(b => b.innerText);
            show.songs.sort((a,b) => items.indexOf(a.country) - items.indexOf(b.country));
            localStorage.setItem('esc_shows', JSON.stringify(shows));
            renderSongs(show.songs);
        }
    });

    renderShows();
    renderComm();
</script>
</body>
</html>
