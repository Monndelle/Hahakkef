<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESC Pro Manager V3.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --blue: linear-gradient(90deg, #0a1931 0%, #185adb 100%); --gold: #c8a45e; }
        body { background: #050a18; color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        .view { display: none; padding: 15px; flex-direction: column; align-items: center; }
        .active { display: flex; }
        .app-header { background: #000; padding: 15px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        
        /* Diamond Flags */
        .diamond { width: 50px; height: 50px; background: #333; transform: rotate(45deg); overflow: hidden; border: 2px solid #666; margin-left: 15px; flex-shrink: 0; }
        .diamond img { width: 150%; height: 150%; transform: rotate(-45deg); object-fit: cover; }

        .item-container { position: relative; margin-bottom: 8px; overflow: hidden; border-radius: 5px; width: 100%; max-width: 500px; }
        .edit-btn { position: absolute; right: 0; top: 0; height: 100%; width: 80px; background: var(--gold); color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; z-index: 1; }
        .item { background: var(--blue); display: flex; align-items: center; height: 95px; position: relative; z-index: 2; transition: 0.3s; width: 100%; }
        .item.slid { transform: translateX(-80px); }
        
        .info { flex-grow: 1; margin-left: 25px; pointer-events: none; }
        .info b { display: block; text-transform: uppercase; color: var(--gold); }

        /* Artist Box & Play Button */
        .artist-img-box { width: 110px; height: 100%; position: relative; clip-path: polygon(25% 0, 100% 0, 100% 100%, 0% 100%); background: #000; }
        .artist-img { width: 100%; height: 100%; object-fit: cover; }
        .yt-play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); color: white; text-decoration: none; font-size: 1.5rem; }

        /* Points Circle (Top 10) */
        .pts-circle { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 15px; background: rgba(0,0,0,0.4); }

        /* Banner Design */
        .user-banner { width: 100%; max-width: 500px; background: black; display: flex; align-items: center; padding: 10px; margin-bottom: 15px; clip-path: polygon(0 0, 100% 0, 95% 100%, 0% 100%); }
        .user-logo { width: 45px; height: 45px; background: #e60000; color: white; border-radius: 5px; font-size: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; text-align: center; margin-right: 15px; }

        .input-panel { background: #111; padding: 15px; width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 8px; box-sizing: border-box; }
        input, button { padding: 12px; border-radius: 5px; border: none; }
        input { background: #222; color: #fff; border: 1px solid #444; }
        .btn-green { background: #4caf50; color: white; font-weight: bold; cursor: pointer; width: 100%; max-width: 500px; padding: 15px; margin-top: 10px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid var(--gold); }
    </style>
</head>
<body>

<div class="app-header">
    <div style="font-weight:bold">2026 EUROVISION</div>
    <div class="user-logo">SIMON<br>ESC</div>
</div>

<div id="view-shows" class="view active">
    <div class="input-panel">
        <input type="text" id="new-show-name" placeholder="Name der neuen Show...">
        <button onclick="addShow()" style="background:var(--gold); font-weight:bold">Show erstellen</button>
    </div>
    <div id="show-container" style="width:100%; display:flex; flex-direction:column; align-items:center; margin-top:20px;"></div>
</div>

<div id="view-ranking" class="view">
    <div class="input-panel" id="add-song-panel">
        <input type="hidden" id="edit-id">
        <input type="text" id="in-country" placeholder="Land (z.B. Germany)">
        <input type="text" id="in-artist" placeholder="Künstler">
        <input type="text" id="in-song" placeholder="Song Name">
        <input type="text" id="in-yt" placeholder="YouTube Link">
        <label style="font-size: 0.7rem; color: #aaa;">Bild:<input type="file" id="file-img" accept="image/*" style="margin-left:5px;"></label>
        <button id="add-btn" onclick="saveItem()" style="background:var(--gold); font-weight:bold">Speichern</button>
        <button onclick="resetToAlpha()" style="background:#444; color:white;">RESET TO ALPHABETICAL</button>
    </div>
    <ul id="ranking-list" style="list-style:none; padding:0; width:100%; max-width:500px;"></ul>
    <button class="btn-green" style="border-radius:30px;" onclick="saveMyTop()">SAVE MY TOP</button>
</div>

<div id="view-final" class="view">
    <div class="user-banner">
        <div class="user-logo">SIMON<br>ESC</div>
        <b style="font-size:1.2rem; margin-left:10px;">SimonESC</b>
    </div>
    <ul id="final-list" style="list-style:none; padding:0; width:100%; max-width:500px;"></ul>
    <button class="btn-green" style="border-radius:30px; background:#444;" onclick="showView('view-ranking')">EDIT MY TOP</button>
</div>

<div class="bottom-nav">
    <button onclick="showView('view-shows')" style="background:none; color:white; border:none; font-weight:bold;">SHOWS</button>
    <button onclick="showView('view-ranking')" style="background:none; color:var(--gold); border:none; font-weight:bold;">MY TOP</button>
</div>

<script>
    let currentShowId = null;
    let startX = 0;
    const pts = [12, 10, 8, 7, 6, 5, 4, 3, 2, 1];

    function getFlagURL(country) {
        if(!country) return '';
        const map = {"germany":"de","croatia":"hr","finland":"fi","albania":"al","ukraine":"ua","austria":"at","sweden":"se","denmark":"dk","italy":"it","france":"fr","spain":"es","norway":"no"};
        const c = country.trim().toLowerCase();
        return map[c] ? `https://flagcdn.com/w160/${map[c]}.png` : `https://via.placeholder.com/50?text=?`;
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'view-final') renderFinal();
    }

    function addShow() {
        const name = document.getElementById('new-show-name').value;
        if(!name) return;
        const shows = JSON.parse(localStorage.getItem('esc_v5') || '[]');
        shows.push({id: Date.now(), name, songs: []});
        localStorage.setItem('esc_v5', JSON.stringify(shows));
        renderShows();
    }

    function renderShows() {
        const container = document.getElementById('show-container');
        const shows = JSON.parse(localStorage.getItem('esc_v5') || '[]');
        container.innerHTML = '';
        shows.forEach(s => {
            const div = document.createElement('div');
            div.style = "width:100%; max-width:500px; background:var(--blue); margin:5px 0; padding:15px; border-radius:5px; cursor:pointer;";
            div.innerHTML = `<b>⭐ ${s.name}</b>`;
            div.onclick = () => { currentShowId = s.id; renderSongs(); showView('view-ranking'); };
            container.appendChild(div);
        });
    }

    async function saveItem() {
        const editId = document.getElementById('edit-id').value;
        const imgFile = document.getElementById('file-img').files[0];
        let imgBase64 = null;
        if(imgFile) {
            imgBase64 = await new Promise(r => {
                const reader = new FileReader();
                reader.onload = () => r(reader.result);
                reader.readAsDataURL(imgFile);
            });
        }
        const shows = JSON.parse(localStorage.getItem('esc_v5') || '[]');
        const show = shows.find(s => s.id === currentShowId);
        const songData = {
            id: editId ? parseInt(editId) : Date.now(),
            country: document.getElementById('in-country').value,
            artist: document.getElementById('in-artist').value,
            song: document.getElementById('in-song').value,
            yt: document.getElementById('in-yt').value,
            img: imgBase64 || (editId ? show.songs.find(s => s.id == editId).img : 'https://via.placeholder.com/110')
        };
        if(editId) {
            const idx = show.songs.findIndex(s => s.id == editId);
            show.songs[idx] = songData;
        } else {
            show.songs.push(songData);
        }
        localStorage.setItem('esc_v5', JSON.stringify(shows));
        document.getElementById('edit-id').value = '';
        document.querySelectorAll('#add-song-panel input').forEach(i => i.value = '');
        renderSongs();
    }

    function renderSongs() {
        const list = document.getElementById('ranking-list');
        const shows = JSON.parse(localStorage.getItem('esc_v5') || '[]');
        const show = shows.find(s => s.id === currentShowId);
        list.innerHTML = '';
        show.songs.forEach((s, i) => {
            const container = document.createElement('div');
            container.className = 'item-container';
            container.innerHTML = `
                <div class="edit-btn" onclick="editSong(${s.id})">EDIT</div>
                <div class="item" ontouchstart="startX=event.touches[0].clientX" ontouchmove="handleSlide(this, event)">
                    <div class="diamond"><img src="${getFlagURL(s.country)}"></div>
                    <div class="info"><b>${s.country}</b><span>${s.artist}</span></div>
                    <div class="artist-img-box">
                        <img src="${s.img}" class="artist-img">
                        ${s.yt ? `<a href="${s.yt}" target="_blank" class="yt-play-overlay">▶</a>` : ''}
                    </div>
                </div>`;
            list.appendChild(container);
        });
    }

    function handleSlide(el, e) {
        let diff = startX - e.touches[0].clientX;
        if(diff > 40) el.classList.add('slid');
        if(diff < -40) el.classList.remove('slid');
    }

    function editSong(id) {
        const shows = JSON.parse(localStorage.getItem('esc_v5') || '[]');
        const song = shows.find(s => s.id === currentShowId).songs.find(s => s.id === id);
        document.getElementById('edit-id').value = song.id;
        document.getElementById('in-country').value = song.country;
        document.getElementById('in-artist').value = song.artist;
        document.getElementById('in-song').value = song.song;
        document.getElementById('in-yt').value = song.yt || '';
        window.scrollTo(0,0);
    }

    function resetToAlpha() {
        const shows = JSON.parse(localStorage.getItem('esc_v5') || '[]');
        const show = shows.find(s => s.id === currentShowId);
        show.songs.sort((a,b) => a.country.localeCompare(b.country));
        localStorage.setItem('esc_v5', JSON.stringify(shows));
        renderSongs();
    }

    function saveMyTop() {
        alert("Saved successfully!");
        showView('view-final');
    }

    function renderFinal() {
        const list = document.getElementById('final-list');
        const shows = JSON.parse(localStorage.getItem('esc_v5') || '[]');
        const show = shows.find(s => s.id === currentShowId);
        list.innerHTML = '';
        show.songs.forEach((s, i) => {
            const p = pts[i] ? `<div class="pts-circle">${pts[i]}</div>` : '';
            const bg = i === 0 ? 'linear-gradient(90deg, #c8a45e, #0a1931)' : (i === 1 ? 'linear-gradient(90deg, #a0a0a0, #0a1931)' : (i === 2 ? 'linear-gradient(90deg, #cd7f32, #0a1931)' : 'var(--blue)'));
            list.innerHTML += `
                <div class="item" style="margin-bottom:5px; background:${bg}">
                    <div style="width:30px; text-align:right; font-weight:bold; margin-right:10px">${i+1}</div>
                    <div class="diamond" style="width:35px; height:35px;"><img src="${getFlagURL(s.country)}"></div>
                    <div class="info"><b>${s.country}</b></div>
                    ${p}
                </div>`;
        });
    }

    new Sortable(document.getElementById('ranking-list'), {
        animation: 150,
        onEnd: () => {
            const shows = JSON.parse(localStorage.getItem('esc_v5') || '[]');
            const show = shows.find(s => s.id === currentShowId);
            const countries = Array.from(document.querySelectorAll('#ranking-list .info b')).map(b => b.innerText);
            show.songs.sort((a,b) => countries.indexOf(a.country.toUpperCase()) - countries.indexOf(b.country.toUpperCase()));
            localStorage.setItem('esc_v5', JSON.stringify(shows));
        }
    });

    renderShows();
</script>
</body>
</html>
