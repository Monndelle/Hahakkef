<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SimonESC Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #050a18; --blue-grad: linear-gradient(90deg, #0a1931 0%, #185adb 100%); --gold: #c8a45e; --red: #e60000; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        .app-header { background: #000; padding: 15px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .view { display: none; padding: 15px; flex-direction: column; align-items: center; }
        .active { display: flex; }

        /* Song Card Design wie im Screenshot */
        .item-container { position: relative; width: 100%; max-width: 500px; margin-bottom: 4px; overflow: hidden; background: #222; border-radius: 4px; }
        .item { background: var(--blue-grad); display: flex; align-items: center; height: 100px; position: relative; z-index: 2; transition: 0.3s; }
        .item.slid { transform: translateX(-120px); }
        
        .handle { padding: 0 15px; cursor: grab; font-size: 20px; color: rgba(255,255,255,0.5); }
        .flag-diamond { width: 50px; height: 50px; background: #333; transform: rotate(45deg); overflow: hidden; border: 2px solid #555; margin-left: 10px; flex-shrink: 0; }
        .flag-diamond img { transform: rotate(-45deg) scale(1.5); width: 100%; height: 100%; object-fit: cover; }
        
        .info { flex-grow: 1; margin-left: 20px; }
        .info b { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        .info div { font-size: 0.9rem; color: #ddd; }
        .info small { font-size: 0.8rem; color: #aaa; font-style: italic; }

        .artist-img-slot { width: 110px; height: 100%; position: relative; clip-path: polygon(20% 0, 100% 0, 100% 100%, 0% 100%); background: #000; }
        .artist-img-slot img { width: 100%; height: 100%; object-fit: cover; }

        /* Buttons im Hintergrund */
        .back-btn { position: absolute; top: 0; height: 100%; width: 60px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .btn-edit { right: 60px; background: var(--gold); color: #000; }
        .btn-del { right: 0; background: var(--red); }

        /* Feedback Popup */
        #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 2px solid var(--gold); padding: 20px 40px; border-radius: 10px; z-index: 1000; display: none; font-weight: bold; text-align: center; }

        /* Community Badge Design */
        .comm-item { width: 100%; max-width: 500px; display: flex; align-items: center; padding: 12px; background: var(--blue-grad); margin-bottom: 2px; }
        .comm-rank { width: 30px; font-weight: bold; }
        .comm-points { background: rgba(0,0,0,0.4); padding: 5px 12px; border-radius: 20px; font-weight: bold; color: #3498db; border: 1px solid #3498db; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; z-index: 100; }
        .nav-btn { background: none; border: none; color: #666; font-size: 0.7rem; font-weight: bold; }
        .nav-btn.active-nav { color: white; }
    </style>
</head>
<body>

<div id="toast">Saved Successfully! ✅</div>

<div class="app-header">
    <span>SIMON ESC</span>
    <span id="view-title">2026 Eurovision</span>
</div>

<div id="view-shows" class="view active">
    <input type="text" id="new-show-name" placeholder="Show Name (z.B. 2026 Vienna)" style="width:90%; padding:15px; margin-bottom:10px; border-radius:5px; border:none;">
    <button onclick="addShow()" style="width:94%; background:var(--gold); padding:15px; border:none; font-weight:bold; border-radius:5px;">ADD NEW SHOW</button>
    <div id="show-container" style="width:100%; margin-top:20px;"></div>
</div>

<div id="view-ranking" class="view">
    <div style="background:#111; padding:15px; border-radius:8px; width:90%; margin-bottom:15px;">
        <input type="hidden" id="edit-id">
        <input type="text" id="in-country" placeholder="Land (ISO Code, z.B. de, ps, ca, hr)" style="width:100%; padding:10px; margin-bottom:5px;">
        <input type="text" id="in-artist" placeholder="Artist" style="width:100%; padding:10px; margin-bottom:5px;">
        <input type="text" id="in-song" placeholder="Song Name" style="width:100%; padding:10px; margin-bottom:5px;">
        <input type="file" id="in-file" style="margin-bottom:10px; font-size:0.8rem;">
        <button onclick="saveItem()" id="save-btn" style="width:100%; background:#27ae60; color:white; padding:12px; border:none; border-radius:5px; font-weight:bold;">SAVE TO LIST</button>
    </div>
    <div id="ranking-list" style="width:100%;"></div>
</div>

<div id="view-community" class="view">
    <div id="community-list" style="width:100%;"></div>
    <div style="background:#111; padding:15px; margin-top:15px; width:90%;">
        <input type="text" id="c-name" placeholder="Land" style="width:100%; padding:10px; margin-bottom:5px;">
        <input type="number" id="c-pts" placeholder="Gesamtpunkte" style="width:100%; padding:10px; margin-bottom:5px;">
        <button onclick="addComm()" style="width:100%; background:#185adb; color:white; padding:12px; border:none; font-weight:bold;">ADD COMMUNITY SCORE</button>
    </div>
</div>

<div class="bottom-nav">
    <button class="nav-btn active-nav" onclick="showView('view-shows', this)">YEARS</button>
    <button class="nav-btn" onclick="showView('view-ranking', this)">MY TOP</button>
    <button class="nav-btn" onclick="showView('view-community', this)">COMMUNITY</button>
</div>

<script>
    let currentShowId = null;
    let startX = 0;

    function showView(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
        if(btn) btn.classList.add('active-nav');
        if(id === 'view-ranking') renderSongs();
        if(id === 'view-community') renderComm();
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 1500);
    }

    // --- SHOWS ---
    function addShow() {
        const name = document.getElementById('new-show-name').value;
        if(!name) return;
        let shows = JSON.parse(localStorage.getItem('esc_v4') || '[]');
        shows.push({id: Date.now(), name, songs: [], community: []});
        localStorage.setItem('esc_v4', JSON.stringify(shows));
        document.getElementById('new-show-name').value = '';
        renderShows();
    }

    function renderShows() {
        const container = document.getElementById('show-container');
        let shows = JSON.parse(localStorage.getItem('esc_v4') || '[]');
        container.innerHTML = '';
        shows.forEach(s => {
            const div = document.createElement('div');
            div.style = "background:#222; margin:5px; padding:20px; border-radius:5px; display:flex; justify-content:space-between;";
            div.innerHTML = `<span>${s.name}</span> <span style="color:red" onclick="deleteShow(${s.id}, event)">✕</span>`;
            div.onclick = () => { currentShowId = s.id; showView('view-ranking'); };
            container.appendChild(div);
        });
    }

    function deleteShow(id, e) {
        e.stopPropagation();
        let shows = JSON.parse(localStorage.getItem('esc_v4') || '[]');
        shows = shows.filter(s => s.id !== id);
        localStorage.setItem('esc_v4', JSON.stringify(shows));
        renderShows();
    }

    // --- RANKING ---
    async function saveItem() {
        if(!currentShowId) return;
        const editId = document.getElementById('edit-id').value;
        const file = document.getElementById('in-file').files[0];
        let shows = JSON.parse(localStorage.getItem('esc_v4') || '[]');
        const sIdx = shows.findIndex(s => s.id === currentShowId);

        let img = editId ? shows[sIdx].songs.find(s => s.id == editId).img : 'https://via.placeholder.com/150';
        if(file) {
            img = await new Promise(r => {
                const reader = new FileReader();
                reader.onload = () => r(reader.result);
                reader.readAsDataURL(file);
            });
        }

        const song = {
            id: editId ? parseInt(editId) : Date.now(),
            country: document.getElementById('in-country').value,
            artist: document.getElementById('in-artist').value,
            song: document.getElementById('in-song').value,
            img: img
        };

        if(editId) {
            const idx = shows[sIdx].songs.findIndex(s => s.id == editId);
            shows[sIdx].songs[idx] = song;
        } else {
            shows[sIdx].songs.push(song);
        }

        localStorage.setItem('esc_v4', JSON.stringify(shows));
        showToast();
        resetInputs();
        renderSongs();
    }

    function renderSongs() {
        const list = document.getElementById('ranking-list');
        let shows = JSON.parse(localStorage.getItem('esc_v4') || '[]');
        const show = shows.find(s => s.id === currentShowId);
        list.innerHTML = '';
        if(!show) return;

        show.songs.forEach(s => {
            const container = document.createElement('div');
            container.className = 'item-container';
            container.dataset.id = s.id;
            
            // Flagge über ISO-Code (z.B. "de" -> Deutschland)
            const flagUrl = `https://flagcdn.com/w160/${s.country.toLowerCase()}.png`;

            container.innerHTML = `
                <div class="back-btn btn-edit" onclick="editSong(${s.id})">EDIT</div>
                <div class="back-btn btn-del" onclick="deleteSong(${s.id})">DEL</div>
                <div class="item" ontouchstart="startX=event.touches[0].clientX" ontouchmove="handleSwipe(this, event)">
                    <div class="handle">≡</div>
                    <div class="flag-diamond"><img src="${flagUrl}" onerror="this.src='https://flagcdn.com/w160/un.png'"></div>
                    <div class="info">
                        <b>${s.country}</b><br>
                        <div>${s.artist}</div>
                        <small>${s.song}</small>
                    </div>
                    <div class="artist-img-slot"><img src="${s.img}"></div>
                </div>`;
            list.appendChild(container);
        });
    }

    function handleSwipe(el, e) {
        let diff = startX - e.touches[0].clientX;
        if(diff > 60) el.classList.add('slid');
        if(diff < -60) el.classList.remove('slid');
    }

    function editSong(id) {
        let shows = JSON.parse(localStorage.getItem('esc_v4') || '[]');
        const s = shows.find(x => x.id === currentShowId).songs.find(x => x.id === id);
        document.getElementById('edit-id').value = s.id;
        document.getElementById('in-country').value = s.country;
        document.getElementById('in-artist').value = s.artist;
        document.getElementById('in-song').value = s.song;
        document.getElementById('save-btn').innerText = "UPDATE SONG";
        window.scrollTo(0,0);
    }

    function deleteSong(id) {
        let shows = JSON.parse(localStorage.getItem('esc_v4') || '[]');
        const sIdx = shows.findIndex(s => s.id === currentShowId);
        shows[sIdx].songs = shows[sIdx].songs.filter(s => s.id !== id);
        localStorage.setItem('esc_v4', JSON.stringify(shows));
        renderSongs();
    }

    // --- COMMUNITY ---
    function addComm() {
        const name = document.getElementById('c-name').value;
        const pts = document.getElementById('c-pts').value;
        if(!name || !pts) return;
        let shows = JSON.parse(localStorage.getItem('esc_v4') || '[]');
        const sIdx = shows.findIndex(s => s.id === currentShowId);
        shows[sIdx].community.push({id: Date.now(), name, pts: parseInt(pts)});
        localStorage.setItem('esc_v4', JSON.stringify(shows));
        renderComm();
    }

    function renderComm() {
        const container = document.getElementById('community-list');
        let shows = JSON.parse(localStorage.getItem('esc_v4') || '[]');
        const show = shows.find(s => s.id === currentShowId);
        container.innerHTML = '';
        if(show) show.community.sort((a,b)=>b.pts-a.pts).forEach((c, i) => {
            const div = document.createElement('div');
            div.className = 'comm-item';
            div.innerHTML = `
                <div class="comm-rank">${i+1}</div>
                <div style="flex:1; font-weight:bold; text-transform:uppercase;">${c.name}</div>
                <div class="comm-points">${c.pts.toLocaleString()}</div>
            `;
            container.appendChild(div);
        });
    }

    function resetInputs() {
        document.getElementById('edit-id').value = '';
        document.querySelectorAll('#view-ranking input').forEach(i => i.value = '');
        document.getElementById('save-btn').innerText = "SAVE TO LIST";
    }

    // Drag & Drop Init
    new Sortable(document.getElementById('ranking-list'), {
        handle: '.handle',
        animation: 150,
        onEnd: () => {
            let shows = JSON.parse(localStorage.getItem('esc_v4') || '[]');
            const sIdx = shows.findIndex(s => s.id === currentShowId);
            const order = Array.from(document.querySelectorAll('.item-container')).map(el => parseInt(el.dataset.id));
            shows[sIdx].songs.sort((a,b) => order.indexOf(a.id) - order.indexOf(b.id));
            localStorage.setItem('esc_v4', JSON.stringify(shows));
        }
    });

    renderShows();
</script>
</body>
</html>
