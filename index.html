<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SimonESC Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { 
            --bg: #050a18; 
            --blue-grad: linear-gradient(90deg, #0a1931 0%, #185adb 100%);
            --gold-grad: linear-gradient(90deg, #c8a45e 0%, #7d6635 100%);
            --silver-grad: linear-gradient(90deg, #95a5a6 0%, #7f8c8d 100%);
            --bronze-grad: linear-gradient(90deg, #a0522d 0%, #8b4513 100%);
            --gold-accent: #c8a45e;
        }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; }
        
        .app-header { background: #000; padding: 15px; border-bottom: 1px solid var(--gold-accent); display: flex; justify-content: space-between; align-items: center; }
        .view { display: none; padding: 10px; flex-direction: column; align-items: center; }
        .active { display: flex; }

        /* Song Card - Anhang 2 Style */
        .item-container { position: relative; width: 100%; max-width: 500px; margin-bottom: 3px; }
        .item { background: var(--blue-grad); display: flex; align-items: center; height: 90px; position: relative; z-index: 2; transition: 0.3s; border-radius: 4px; overflow: hidden; }
        
        /* Platzierung Styles */
        .item.rank-1 { background: var(--gold-grad); }
        .item.rank-2 { background: var(--silver-grad); }
        .item.rank-3 { background: var(--bronze-grad); }

        .rank-num { width: 40px; text-align: center; font-weight: bold; font-size: 1.1rem; opacity: 0.8; }
        
        .flag-diamond { width: 45px; height: 45px; transform: rotate(45deg); overflow: hidden; border: 2px solid rgba(255,255,255,0.3); flex-shrink: 0; margin: 0 10px; display: flex; align-items: center; justify-content: center; background: #111; }
        .flag-diamond img, .flag-diamond span { transform: rotate(-45deg); width: 100%; height: 100%; object-fit: cover; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        .info { flex-grow: 1; margin-left: 10px; overflow: hidden; }
        .info b { display: block; text-transform: uppercase; font-size: 1.1rem; white-space: nowrap; }
        .info span { font-size: 0.9rem; color: #eee; }
        .info small { display: block; font-size: 0.75rem; opacity: 0.6; }

        /* Punkte-Bubble wie im Screenshot */
        .pts-badge { width: 45px; height: 45px; border-radius: 50%; background: rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; margin-right: 10px; color: #fff; }

        .artist-img-slot { width: 90px; height: 100%; clip-path: polygon(20% 0, 100% 0, 100% 100%, 0% 100%); background: #000; }
        .artist-img-slot img { width: 100%; height: 100%; object-fit: cover; }

        /* Buttons & UI */
        .btn-main { width: 94%; padding: 15px; border: none; border-radius: 30px; font-weight: bold; margin: 10px 0; cursor: pointer; text-transform: uppercase; }
        .btn-save { background: #6ab04c; color: white; }
        .btn-reset { background: #3d3d3d; color: white; font-size: 0.8rem; margin-bottom: 20px; }
        
        #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 2px solid var(--gold-accent); padding: 20px 40px; border-radius: 10px; z-index: 1000; display: none; text-align: center; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #222; }
        .nav-btn { background: none; border: none; color: #666; font-size: 0.7rem; font-weight: bold; cursor: pointer; }
        .nav-btn.active-nav { color: white; }
    </style>
</head>
<body>

<div id="toast"><h2 style="margin:0; color:var(--gold-accent);">Saved Successfully!</h2><p>Your Top has been updated. ✅</p></div>

<div class="app-header">
    <span style="color:red">SIMON<br>ESC</span>
    <span id="header-title">2026 Eurovision</span>
    <div style="width:30px"></div>
</div>

<div id="view-shows" class="view active">
    <div style="background:#111; padding:15px; border-radius:10px; width:90%; margin-bottom:20px;">
        <input type="text" id="new-show-name" placeholder="Name (z.B. 2026 Vienna)" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
        <button onclick="addShow()" style="width:100%; background:var(--gold-accent); border:none; padding:10px; font-weight:bold;">CREATE SHOW</button>
    </div>
    <div id="show-container" style="width:100%;"></div>
</div>

<div id="view-ranking" class="view">
    <button class="btn-main btn-reset" onclick="resetAlphabetical()">RESET TO ALPHABETICAL</button>
    
    <div id="ranking-list" style="width:100%;"></div>

    <button class="btn-main btn-save" onclick="saveTop()">SAVE MY TOP</button>

    <div style="background:#111; padding:15px; border-radius:10px; width:90%; margin-top:20px;">
        <input type="hidden" id="edit-id">
        <input type="text" id="in-country" placeholder="ISO-Code (de, ps, ca...)" style="width:48%;">
        <input type="text" id="in-emoji" placeholder="Emoji" style="width:48%;">
        <input type="text" id="in-artist" placeholder="Artist" style="width:100%; margin:5px 0;">
        <input type="text" id="in-song" placeholder="Song Name" style="width:100%; margin:5px 0;">
        <input type="file" id="in-file" style="margin:5px 0; font-size:0.7rem;">
        <button onclick="saveArtist()" style="width:100%; background:var(--blue-grad); color:white; border:none; padding:10px; font-weight:bold;">ADD/UPDATE ARTIST</button>
    </div>
</div>

<div id="view-scoreboard" class="view">
    <div id="final-results" style="width:100%;"></div>
    <button class="btn-main" style="background:var(--gold-accent)" onclick="showView('view-ranking')">EDIT MY TOP</button>
</div>

<div class="bottom-nav">
    <button class="nav-btn active-nav" onclick="showView('view-shows', this)">YEARS</button>
    <button class="nav-btn" onclick="showView('view-ranking', this)">MY TOP</button>
</div>

<script>
    let currentShowId = null;
    const pointsMap = {1:12, 2:10, 3:8, 4:7, 5:6, 6:5, 7:4, 8:3, 9:2, 10:1};

    function showView(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
        if(btn) btn.classList.add('active-nav');
        if(id === 'view-ranking') renderSongs();
        if(id === 'view-scoreboard') renderScoreboard();
    }

    // --- SHOW LOGIC ---
    function addShow() {
        const name = document.getElementById('new-show-name').value;
        if(!name) return;
        let shows = JSON.parse(localStorage.getItem('esc_v5') || '[]');
        shows.push({id: Date.now(), name, songs: []});
        localStorage.setItem('esc_v5', JSON.stringify(shows));
        document.getElementById('new-show-name').value = '';
        renderShows();
    }

    function copyShow(id) {
        let shows = JSON.parse(localStorage.getItem('esc_v5') || '[]');
        const original = shows.find(s => s.id === id);
        const copy = {...original, id: Date.now(), name: original.name + " (Copy)"};
        shows.push(copy);
        localStorage.setItem('esc_v5', JSON.stringify(shows));
        renderShows();
    }

    function renderShows() {
        const container = document.getElementById('show-container');
        let shows = JSON.parse(localStorage.getItem('esc_v5') || '[]');
        container.innerHTML = '';
        shows.forEach(s => {
            const div = document.createElement('div');
            div.style = "background:#1a1a1a; margin:5px; padding:15px; border-radius:8px; display:flex; justify-content:space-between; align-items:center;";
            div.innerHTML = `
                <div onclick="openShow(${s.id})"><b>${s.name}</b><br><small>${s.songs.length} Artists</small></div>
                <div>
                    <span style="margin-right:15px; color:gray;" onclick="copyShow(${s.id})">📋</span>
                    <span style="color:red;" onclick="deleteShow(${s.id})">✕</span>
                </div>`;
            container.appendChild(div);
        });
    }

    function openShow(id) {
        currentShowId = id;
        const shows = JSON.parse(localStorage.getItem('esc_v5') || '[]');
        document.getElementById('header-title').innerText = shows.find(s => s.id === id).name;
        showView('view-ranking');
    }

    function deleteShow(id) {
        if(!confirm("Show löschen?")) return;
        let shows = JSON.parse(localStorage.getItem('esc_v5') || '[]');
        shows = shows.filter(s => s.id !== id);
        localStorage.setItem('esc_v5', JSON.stringify(shows));
        renderShows();
    }

    // --- ARTIST LOGIC ---
    async function saveArtist() {
        const file = document.getElementById('in-file').files[0];
        let shows = JSON.parse(localStorage.getItem('esc_v5') || '[]');
        const sIdx = shows.findIndex(s => s.id === currentShowId);
        
        let img = 'https://via.placeholder.com/100';
        if(file) {
            img = await new Promise(r => {
                const reader = new FileReader();
                reader.onload = () => r(reader.result);
                reader.readAsDataURL(file);
            });
        }

        const artist = {
            id: Date.now(),
            country: document.getElementById('in-country').value,
            emoji: document.getElementById('in-emoji').value,
            name: document.getElementById('in-artist').value,
            song: document.getElementById('in-song').value,
            img: img
        };

        shows[sIdx].songs.push(artist);
        localStorage.setItem('esc_v5', JSON.stringify(shows));
        renderSongs();
        document.querySelectorAll('#view-ranking input').forEach(i => i.value='');
    }

    function renderSongs() {
        const list = document.getElementById('ranking-list');
        let shows = JSON.parse(localStorage.getItem('esc_v5') || '[]');
        const show = shows.find(s => s.id === currentShowId);
        list.innerHTML = '';
        if(!show) return;

        show.songs.forEach((s, i) => {
            const rank = i + 1;
            const pts = pointsMap[rank] || '';
            const li = document.createElement('div');
            li.className = 'item-container';
            li.dataset.id = s.id;
            
            const flagContent = s.emoji ? `<span>${s.emoji}</span>` : `<img src="https://flagcdn.com/w160/${s.country.toLowerCase()}.png">`;

            li.innerHTML = `
                <div class="item ${rank <= 3 ? 'rank-'+rank : ''}">
                    <div class="rank-num">${rank}</div>
                    <div class="flag-diamond">${flagContent}</div>
                    <div class="info">
                        <b>${s.country || '---'}</b>
                        <span>${s.name}</span>
                        <small>${s.song}</small>
                    </div>
                    ${pts ? `<div class="pts-badge">${pts}</div>` : ''}
                    <div class="artist-img-slot"><img src="${s.img}"></div>
                </div>`;
            list.appendChild(li);
        });
    }

    function resetAlphabetical() {
        let shows = JSON.parse(localStorage.getItem('esc_v5') || '[]');
        const sIdx = shows.findIndex(s => s.id === currentShowId);
        shows[sIdx].songs.sort((a,b) => a.country.localeCompare(b.country));
        localStorage.setItem('esc_v5', JSON.stringify(shows));
        renderSongs();
    }

    function saveTop() {
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => {
            t.style.display = 'none';
            showView('view-scoreboard');
        }, 1500);
    }

    function renderScoreboard() {
        const container = document.getElementById('final-results');
        let shows = JSON.parse(localStorage.getItem('esc_v5') || '[]');
        const show = shows.find(s => s.id === currentShowId);
        container.innerHTML = `<h2 style="text-align:center; color:var(--gold-accent)">YOUR SCOREBOARD</h2>`;
        
        show.songs.forEach((s, i) => {
            const rank = i + 1;
            const pts = pointsMap[rank] || '';
            const row = document.createElement('div');
            row.style = `display:flex; align-items:center; background:${rank <= 3 ? 'rgba(200,164,94,0.1)' : '#111'}; margin:2px; padding:10px; border-radius:5px; border-left: 4px solid ${rank <= 3 ? 'var(--gold-accent)' : 'transparent'}`;
            
            row.innerHTML = `
                <div style="width:30px; font-weight:bold;">${rank}</div>
                <div class="flag-diamond" style="width:30px; height:30px; margin: 0 10px;">
                    ${s.emoji ? `<span>${s.emoji}</span>` : `<img src="https://flagcdn.com/w160/${s.country.toLowerCase()}.png">`}
                </div>
                <div style="flex:1; text-transform:uppercase; font-weight:bold; font-size:0.9rem;">${s.country}</div>
                ${pts ? `<div class="pts-badge" style="width:35px; height:35px; font-size:0.9rem; border-color:var(--gold-accent); color:var(--gold-accent);">${pts}</div>` : ''}
            `;
            container.appendChild(row);
        });
    }

    // Drag & Drop
    new Sortable(document.getElementById('ranking-list'), {
        animation: 150,
        onEnd: () => {
            let shows = JSON.parse(localStorage.getItem('esc_v5') || '[]');
            const sIdx = shows.findIndex(s => s.id === currentShowId);
            const order = Array.from(document.querySelectorAll('.item-container')).map(el => parseInt(el.dataset.id));
            shows[sIdx].songs.sort((a,b) => order.indexOf(a.id) - order.indexOf(b.id));
            localStorage.setItem('esc_v5', JSON.stringify(shows));
            renderSongs();
        }
    });

    renderShows();
</script>
</body>
</html>
