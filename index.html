<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESC Pro V2 Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --blue: linear-gradient(90deg, #0a1931 0%, #185adb 100%); --gold: #c8a45e; --red: #e60000; }
        body { background: #050a18; color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        .view { display: none; padding: 15px; flex-direction: column; align-items: center; }
        .active { display: flex; }
        .app-header { background: #000; padding: 15px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .show-item { width: 100%; max-width: 500px; background: var(--blue); margin: 5px 0; padding: 15px; border-radius: 5px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .item-container { position: relative; margin-bottom: 8px; overflow: hidden; border-radius: 5px; background: #333; }
        .edit-btn { position: absolute; right: 60px; top: 0; height: 100%; width: 60px; background: var(--gold); color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .del-btn { position: absolute; right: 0; top: 0; height: 100%; width: 60px; background: var(--red); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .item { background: var(--blue); display: flex; align-items: center; height: 95px; position: relative; z-index: 2; transition: 0.3s; width: 100%; }
        .item.slid { transform: translateX(-120px); }
        .info { flex-grow: 1; margin-left: 15px; pointer-events: none; }
        .flag { width: 55px; height: 38px; margin-left: 10px; border: 1px solid #fff; object-fit: cover; }
        .artist-img { width: 100px; height: 100%; object-fit: cover; clip-path: polygon(25% 0, 100% 0, 100% 100%, 0% 100%); background: #000; flex-shrink: 0; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid var(--gold); z-index: 100; }
        .input-panel { background: #111; padding: 15px; width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 8px; box-sizing: border-box; border-radius: 8px; margin-bottom: 10px; }
        input { padding: 10px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; }
        button { cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div class="app-header">
    <div style="font-weight:bold">SIMON ESC</div>
    <div id="header-title">Show Manager</div>
</div>

<div id="view-shows" class="view active">
    <div class="input-panel">
        <input type="text" id="new-show-name" placeholder="Name der neuen Show...">
        <button onclick="addShow()" style="background:var(--gold); padding:10px; border:none; font-weight:bold">Show erstellen</button>
    </div>
    <div id="show-container" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
</div>

<div id="view-ranking" class="view">
    <div class="input-panel">
        <input type="hidden" id="edit-id">
        <input type="text" id="in-country" placeholder="Land (Englisch für Flagge)">
        <input type="text" id="in-artist" placeholder="Sänger">
        <input type="text" id="in-song" placeholder="Song Name">
        <input type="text" id="in-emoji" placeholder="Flagge als Emoji">
        <input type="file" id="file-img" accept="image/*">
        <button id="add-btn" onclick="saveItem()" style="background:var(--gold); padding:10px; border:none; font-weight:bold">Speichern</button>
    </div>
    <ul id="ranking-list" style="list-style:none; padding:0; width:100%; max-width:500px;"></ul>
</div>

<div id="view-community" class="view">
    <div id="community-list" style="width:100%; max-width:500px;"></div>
    <div class="input-panel">
        <input type="hidden" id="c-edit-id">
        <input type="text" id="c-name" placeholder="Land">
        <input type="number" id="c-pts" placeholder="Punkte">
        <div style="display:flex; gap:10px;">
            <button id="c-add-btn" onclick="addComm()" style="background:#185adb; color:white; padding:10px; border:none; flex-grow:2; font-weight:bold;">Eintragen</button>
            <button id="c-del-btn" onclick="deleteComm()" style="background:var(--red); color:white; padding:10px; border:none; display:none; flex-grow:1;">Löschen</button>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <button onclick="showView('view-shows')" style="background:#185adb; color:white; border:none; padding:10px; border-radius:5px; font-weight:bold;">SHOWS</button>
    <button onclick="showView('view-ranking')" style="background:#4caf50; color:white; border:none; padding:10px; border-radius:5px; font-weight:bold;">MY TOP</button>
    <button onclick="showView('view-community')" style="background:#185adb; color:white; border:none; padding:10px; border-radius:5px; font-weight:bold;">COMMUNITY</button>
</div>

<script>
    let currentShowId = null;
    let startX = 0;

    function getFlagURL(country) {
        if(!country) return null;
        const c = country.trim().toLowerCase();
        const map = {
            "germany":"de","croatia":"hr","switzerland":"ch","ukraine":"ua","ireland":"ie","italy":"it","france":"fr","spain":"es","sweden":"se","norway":"no","netherlands":"nl","finland":"fi","israel":"il","portugal":"pt","armenia":"am","cyprus":"cy","greece":"gr","austria":"at","poland":"pl","belgium":"be","estonia":"ee","latvia":"lv","lithuania":"lt","albania":"al","slovenia":"si","serbia":"rs","georgia":"ge","luxembourg":"lu","malta":"mt","moldova":"md","san marino":"sm","iceland":"is","czechia":"cz"
        };
        return map[c] ? `https://flagcdn.com/w80/${map[c]}.png` : null;
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'view-community') renderComm();
        if(id === 'view-ranking') renderSongs();
    }

    // --- SHOW LOGIC ---
    function addShow() {
        const name = document.getElementById('new-show-name').value;
        if(!name) return;
        const shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        shows.push({id: Date.now(), name, songs: [], community: []});
        localStorage.setItem('esc_v3', JSON.stringify(shows));
        document.getElementById('new-show-name').value = '';
        renderShows();
    }

    function deleteShow(id, event) {
        event.stopPropagation();
        if(!confirm("Ganze Show löschen?")) return;
        let shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        shows = shows.filter(s => s.id !== id);
        localStorage.setItem('esc_v3', JSON.stringify(shows));
        renderShows();
    }

    function renderShows() {
        const container = document.getElementById('show-container');
        const shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        container.innerHTML = '';
        shows.forEach(s => {
            const div = document.createElement('div');
            div.className = 'show-item';
            div.innerHTML = `<b>⭐ ${s.name}</b> <span onclick="deleteShow(${s.id}, event)" style="background:#000; padding:5px 10px; border-radius:50%; color:red;">✕</span>`;
            div.onclick = () => { currentShowId = s.id; renderSongs(); showView('view-ranking'); };
            container.appendChild(div);
        });
    }

    // --- RANKING LOGIC ---
    async function saveItem() {
        if(!currentShowId) return alert("Wähle erst eine Show!");
        const editId = document.getElementById('edit-id').value;
        const imgFile = document.getElementById('file-img').files[0];
        let imgBase64 = null;
        
        let shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        const sIdx = shows.findIndex(s => s.id === currentShowId);
        
        if(imgFile) {
            imgBase64 = await new Promise(r => {
                const reader = new FileReader();
                reader.onload = () => r(reader.result);
                reader.readAsDataURL(imgFile);
            });
        }

        const songData = {
            id: editId ? parseInt(editId) : Date.now(),
            country: document.getElementById('in-country').value,
            artist: document.getElementById('in-artist').value,
            song: document.getElementById('in-song').value,
            emoji: document.getElementById('in-emoji').value,
            img: imgBase64 || (editId ? shows[sIdx].songs.find(s => s.id == editId).img : 'https://via.placeholder.com/110')
        };

        if(editId) {
            const idx = shows[sIdx].songs.findIndex(s => s.id == editId);
            shows[sIdx].songs[idx] = songData;
        } else {
            shows[sIdx].songs.push(songData);
        }

        localStorage.setItem('esc_v3', JSON.stringify(shows));
        resetRankingInputs();
        renderSongs();
    }

    function deleteSong(id) {
        let shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        const sIdx = shows.findIndex(s => s.id === currentShowId);
        shows[sIdx].songs = shows[sIdx].songs.filter(s => s.id !== id);
        localStorage.setItem('esc_v3', JSON.stringify(shows));
        renderSongs();
    }

    function renderSongs() {
        const list = document.getElementById('ranking-list');
        const shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        const show = shows.find(s => s.id === currentShowId);
        list.innerHTML = '';
        if(!show) return;
        show.songs.forEach((s) => {
            const flagUrl = getFlagURL(s.country);
            const flagDisplay = s.emoji ? `<div style="font-size:2rem; margin:10px">${s.emoji}</div>` : (flagUrl ? `<img src="${flagUrl}" class="flag">` : `<div style="font-size:2rem; margin:10px">🚩</div>`);
            
            const container = document.createElement('div');
            container.className = 'item-container';
            container.innerHTML = `
                <div class="edit-btn" onclick="editSong(${s.id})">EDIT</div>
                <div class="del-btn" onclick="deleteSong(${s.id})">DEL</div>
                <div class="item" ontouchstart="startX=event.touches[0].clientX" ontouchmove="if(startX-event.touches[0].clientX>40)this.classList.add('slid');if(startX-event.touches[0].clientX<-40)this.classList.remove('slid')">
                    ${flagDisplay}
                    <div class="info"><b>${s.country}</b><br>${s.artist}<br><small>${s.song}</small></div>
                    <div class="artist-img"><img src="${s.img}" style="width:100%;height:100%;object-fit:cover"></div>
                </div>`;
            list.appendChild(container);
        });
    }

    function editSong(id) {
        const shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        const show = shows.find(s => s.id === currentShowId);
        const s = show.songs.find(x => x.id === id);
        document.getElementById('edit-id').value = s.id;
        document.getElementById('in-country').value = s.country;
        document.getElementById('in-artist').value = s.artist;
        document.getElementById('in-song').value = s.song;
        document.getElementById('in-emoji').value = s.emoji || '';
        document.getElementById('add-btn').innerText = "Ändern";
        window.scrollTo(0,0);
    }

    // --- COMMUNITY LOGIC ---
    function addComm() {
        const editId = document.getElementById('c-edit-id').value;
        const name = document.getElementById('c-name').value;
        const pts = document.getElementById('c-pts').value;
        if(!name || !pts) return;

        let shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        const sIdx = shows.findIndex(s => s.id === currentShowId);
        
        if(editId) {
            const idx = shows[sIdx].community.findIndex(c => c.id == editId);
            shows[sIdx].community[idx] = {id: parseInt(editId), name, pts: parseInt(pts)};
        } else {
            shows[sIdx].community.push({id: Date.now(), name, pts: parseInt(pts)});
        }
        
        localStorage.setItem('esc_v3', JSON.stringify(shows));
        resetCommInputs();
        renderComm();
    }

    function deleteComm() {
        const id = document.getElementById('c-edit-id').value;
        if(!id) return;
        let shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        const sIdx = shows.findIndex(s => s.id === currentShowId);
        shows[sIdx].community = shows[sIdx].community.filter(c => c.id != id);
        localStorage.setItem('esc_v3', JSON.stringify(shows));
        resetCommInputs();
        renderComm();
    }

    function editComm(id) {
        const shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        const show = shows.find(s => s.id === currentShowId);
        const item = show.community.find(c => c.id === id);
        document.getElementById('c-edit-id').value = item.id;
        document.getElementById('c-name').value = item.name;
        document.getElementById('c-pts').value = item.pts;
        document.getElementById('c-add-btn').innerText = "Ändern";
        document.getElementById('c-del-btn').style.display = "block";
    }

    function renderComm() {
        const container = document.getElementById('community-list');
        const shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        const show = shows.find(s => s.id === currentShowId);
        container.innerHTML = '';
        if(show && show.community) {
            show.community.sort((a,b)=>b.pts-a.pts).forEach((c,i)=> {
                const div = document.createElement('div');
                div.style = "display:flex;padding:12px;background:#0a1931;border-bottom:1px solid #185adb;cursor:pointer;align-items:center;";
                div.innerHTML = `<b style="width:25px;">${i+1}</b><span style="margin-left:15px;flex-grow:1">${c.name}</span><b style="background:#185adb; padding:2px 8px; border-radius:10px;">${c.pts}</b>`;
                div.onclick = () => editComm(c.id);
                container.appendChild(div);
            });
        }
    }

    // --- HELPERS ---
    function resetRankingInputs() {
        document.getElementById('edit-id').value = '';
        document.getElementById('add-btn').innerText = "Speichern";
        document.querySelectorAll('#view-ranking input').forEach(i => i.value = '');
    }

    function resetCommInputs() {
        document.getElementById('c-edit-id').value = '';
        document.getElementById('c-name').value = '';
        document.getElementById('c-pts').value = '';
        document.getElementById('c-add-btn').innerText = "Eintragen";
        document.getElementById('c-del-btn').style.display = "none";
    }

    new Sortable(document.getElementById('ranking-list'), {
        animation: 150,
        onEnd: () => {
            let shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
            const sIdx = shows.findIndex(s => s.id === currentShowId);
            const countries = Array.from(document.querySelectorAll('.item .info b')).map(b => b.innerText);
            shows[sIdx].songs.sort((a,b) => countries.indexOf(a.country.toUpperCase()) - countries.indexOf(b.country.toUpperCase()));
            localStorage.setItem('esc_v3', JSON.stringify(shows));
        }
    });

    renderShows();
</script>
</body>
</html>
