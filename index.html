<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Custom Scoreboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        body {
            background-color: #000033; /* ESC Dunkelblau */
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: #ffcc00; text-shadow: 2px 2px 10px rgba(255,204,0,0.5); }
        .input-area { margin-bottom: 20px; }
        input { padding: 10px; border-radius: 5px; border: none; width: 200px; }
        button { padding: 10px; background: #ffcc00; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; }
        
        #ranking-list {
            list-style: none;
            padding: 0;
            width: 100%;
            max-width: 400px;
            counter-reset: rank-counter;
        }
        .rank-item {
            background: rgba(255, 255, 255, 0.1);
            margin: 8px 0;
            padding: 15px;
            display: flex;
            align-items: center;
            border-radius: 10px;
            cursor: grab;
            border-left: 5px solid #ffcc00;
            transition: transform 0.2s;
        }
        .rank-item::before {
            counter-increment: rank-counter;
            content: counter(rank-counter);
            background: #ffcc00;
            color: #000;
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            margin-right: 15px;
            font-weight: bold;
        }
        .rank-item:active { cursor: grabbing; transform: scale(1.02); }
    </style>
</head>
<body>

    <h1>My Personal Scoreboard</h1>

    <div class="input-area">
        <input type="text" id="artist-name" placeholder="Name eingeben...">
        <button onclick="addItem()">Hinzufügen</button>
    </div>

    <ul id="ranking-list">
        </ul>

    <script>
        function addItem() {
            const name = document.getElementById('artist-name').value;
            if (name === '') return;
            
            const li = document.createElement('li');
            li.className = 'rank-item';
            li.textContent = name;
            
            document.getElementById('ranking-list').appendChild(li);
            document.getElementById('artist-name').value = '';
        }

        // Macht die Liste sortierbar (Drag & Drop)
        new Sortable(document.getElementById('ranking-list'), {
            animation: 150,
            ghostClass: 'blue-background-class'
        });
    </script>
</body>
</html>
