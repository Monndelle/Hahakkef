<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SimonESC - Ultra Stable Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { 
            --bg: #050a18; 
            --blue-grad: linear-gradient(90deg, #0a1931 0%, #185adb 100%);
            --neutral-grad: linear-gradient(90deg, #1a1a1a 0%, #333 100%);
            --gold-grad: linear-gradient(90deg, #c8a45e 0%, #7d6635 100%);
            --silver-grad: linear-gradient(90deg, #95a5a6 0%, #7f8c8d 100%);
            --bronze-grad: linear-gradient(90deg, #a0522d 0%, #8b4513 100%);
            --gold-accent: #c8a45e;
        }
        
        html, body { height: 100%; margin: 0; overflow: hidden; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; user-select: none; }
        
        .app-header { height: 60px; background: #000; padding: 0 15px; border-bottom: 1px solid var(--gold-accent); display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 100; }
        .view { display: none; height: calc(100vh - 130px); overflow-y: auto; padding: 10px; flex-direction: column; align-items: center; -webkit-overflow-scrolling: touch; }
        .active { display: flex; }

        .item-container { width: 100%; max-width: 500px; margin-bottom: 6px; border-radius: 6px; overflow: hidden; position: relative; flex-shrink: 0; }
        .item { background: var(--neutral-grad); display: flex; align-items: center; height: 95px; }
        
        .is-ranked .item { background: var(--blue-grad); }
        .is-ranked .item.rank-1 { background: var(--gold-grad); }
        .is-ranked .item.rank-2 { background: var(--silver-grad); }
        .is-ranked .item.rank-3 { background: var(--bronze-grad); }

        .rank-num { width: 35px; text-align: center; font-weight: 700; opacity: 0.6; flex-shrink: 0; }
        .flag-pure { width: 45px; height: 45px; margin: 0 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; flex-shrink: 0; }

        .info { flex-grow: 1; padding: 5px 0; display: flex; flex-direction: column; justify-content: center; overflow: hidden; white-space: nowrap; }
        .info b { color: var(--gold-accent); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        .info span { font-size: 1.25rem; font-weight: 700; line-height: 1.1; overflow: hidden; text-overflow: ellipsis; }
        .info small { opacity: 0.5; font-size: 0.85rem; }

        .pts-badge { display: none; width: 42px; height: 42px; border-radius: 50%; background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.2); align-items: center; justify-content: center; font-weight: bold; margin-right: 15px; flex-shrink: 0; z-index: 5; }
        .is-ranked .pts-badge { display: flex; }

        .artist-img-slot { width: 100px; height: 100%; position: absolute; right: 0; clip-path: polygon(25% 0, 100% 0, 100% 100%, 0% 100%); background: #000; z-index: 1; }
        .artist-img-slot img { width: 100%; height: 100%; object-fit: cover; }

        .btn-reset { width: 100%; max-width: 500px; padding: 12px; background: rgba(255,255,255,0.05); color: #888; border: 1px solid #333; border-radius: 25px; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; flex-shrink: 0; }

        .input-group { background: #111; padding: 15px; border-radius: 10px; width: 95%; max-width: 500px; margin: 15px 0; border: 1px solid #222; flex-shrink: 0; }
        input { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 4px; background: #222; color: white; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 30px; font-weight: bold; text-transform: uppercase; cursor: pointer; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 100; }
        .nav-btn { background: none; border: none; color: #555; font-size: 0.75rem; font-weight: bold; padding: 10px; }
        .nav-btn.active-nav { color: white; border-bottom: 2px solid var(--gold-accent); }
    </style>
</head>
<body>

<div class="app-header">
    <div style="font-weight:900; color:red; line-height:1;">SIMON<br>ESC</div>
    <span id="header-title">ESC MANAGER</span>
    <div style="width:40px"></div>
</div>

<div id="view-shows" class="view active">
    <div class="input-group">
        <input type="text" id="new-show-name" placeholder="Name der Show">
        <button onclick="addShow()" class="btn-main" style="background:var(--gold-accent); margin-top:10px;">SHOW ERSTELLEN</button>
    </div>
    <div id="show-container" style="width:100%; display: flex; flex-direction: column; align-items: center;"></div>
</div>

<div id="view-ranking" class="view">
    <button class="btn-reset" onclick="resetAlphabetical()">Reset to Alphabetically</button>
    <div id="ranking-list" style="width:100%; display: flex; flex-direction: column; align-items: center;"></div>
    
    <div class="input-group" id="artist-form">
        <input type="hidden" id="edit-artist-id">
        <div style="display:flex; gap:5px;">
            <input type="text" id="in-country" placeholder="Land" style="width:70%;">
            <input type="text" id="in-emoji" placeholder="Emoji" style="width:30%;">
        </div>
        <input type="text" id="in-artist" placeholder="Artist">
        <input type="text" id="in-song" placeholder="Song">
        <input type="file" id="in-file" accept="image/*">
        <button onclick="saveArtist()" class="btn-main" style="background:var(--blue-grad); margin-top:10px;">SPEICHERN</button>
    </div>
</div>

<div id="view-community" class="view">
    <div id="community-list" style="width:100%; display: flex; flex-direction: column; align-items: center;"></div>
    <div class="input-group">
        <input type="hidden" id="edit-comm-id">
        <div style="display:flex; gap:5px;">
            <input type="text" id="c-country" placeholder="Land" style="width:70%;">
            <input type="text" id="c-emoji" placeholder="Emoji" style="width:30%;">
        </div>
        <input type="number" id="c-pts" placeholder="Gesamtpunkte">
        <button onclick="saveComm()" class="btn-main" style="background:#185adb; margin-top:10px;">SCORE SPEICHERN</button>
    </div>
</div>

<div class="bottom-nav">
    <button class="nav-btn active-nav" onclick="showView('view-shows', this)">YEARS</button>
    <button class="nav-btn" onclick="showView('view-ranking', this)">MY TOP</button>
    <button class="nav-btn" onclick="showView('view-community', this)">COMMUNITY</button>
</div>

<script>
    let currentShowId = null;
    let longPressTimer;
    const ptsMap = {1:12, 2:10, 3:8, 4:7, 5:6, 6:5, 7:4, 8:3, 9:2, 10:1};

    function showView(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
        if(btn) btn.classList.add('active-nav');
        if(id === 'view-ranking') renderSongs();
        if(id === 'view-community') renderComm();
    }

    function applyLongPress(el, fn) {
        el.addEventListener('touchstart', (e) => {
            longPressTimer = setTimeout(() => { e.preventDefault(); fn(); }, 800);
        }, {passive: false});
        el.addEventListener('touchend', () => clearTimeout(longPressTimer));
        el.addEventListener('touchmove', () => clearTimeout(longPressTimer));
    }

    function addShow() {
        const name = document.getElementById('new-show-name').value;
        if(!name) return;
        let shows = JSON.parse(localStorage.getItem('esc_vFINAL') || '[]');
        shows.push({id: Date.now(), name, songs: [], community: [], isRanked: false});
        localStorage.setItem('esc_vFINAL', JSON.stringify(shows));
        document.getElementById('new-show-name').value = '';
        renderShows();
    }

    function renderShows() {
        const container = document.getElementById('show-container');
        let shows = JSON.parse(localStorage.getItem('esc_vFINAL') || '[]');
        container.innerHTML = '';
        shows.forEach(s => {
            const div = document.createElement('div');
            div.className = 'item-container';
            div.innerHTML = `<div class="item" style="padding:15px; border-left:4px solid var(--gold-accent);"><b>${s.name}</b></div>`;
            div.onclick = () => openShow(s.id);
            applyLongPress(div, () => { if(confirm('Show löschen?')) { shows = shows.filter(x => x.id !== s.id); localStorage.setItem('esc_vFINAL', JSON.stringify(shows)); renderShows(); }});
            container.appendChild(div);
        });
    }

    function openShow(id) {
        currentShowId = id;
        const shows = JSON.parse(localStorage.getItem('esc_vFINAL'));
        document.getElementById('header-title').innerText = shows.find(s => s.id === id).name;
        showView('view-ranking');
    }

    async function saveArtist() {
        let shows = JSON.parse(localStorage.getItem('esc_vFINAL'));
        const sIdx = shows.findIndex(s => s.id === currentShowId);
        const editId = document.getElementById('edit-artist-id').value;
        const file = document.getElementById('in-file').files[0];
        
        let img = editId ? (shows[sIdx].songs.find(x => x.id == editId)?.img || '') : '';
        if(file) {
            img = await new Promise(r => {
                const reader = new FileReader();
                reader.onload = () => r(reader.result);
                reader.readAsDataURL(file);
            });
        }

        const data = {
            id: editId ? parseInt(editId) : Date.now(),
            country: document.getElementById('in-country').value,
            emoji: document.getElementById('in-emoji').value,
            name: document.getElementById('in-artist').value,
            song: document.getElementById('in-song').value,
            img: img
        };

        if(editId) {
            const aIdx = shows[sIdx].songs.findIndex(x => x.id == editId);
            shows[sIdx].songs[aIdx] = data;
        } else {
            shows[sIdx].songs.push(data);
        }

        localStorage.setItem('esc_vFINAL', JSON.stringify(shows));
        resetForm('artist-form');
        renderSongs();
    }

    function renderSongs() {
        const list = document.getElementById('ranking-list');
        const show = JSON.parse(localStorage.getItem('esc_vFINAL')).find(s => s.id === currentShowId);
        list.innerHTML = '';
        list.className = show.isRanked ? 'is-ranked' : '';

        show.songs.forEach((s, i) => {
            const rank = i + 1;
            const pts = ptsMap[rank] || '';
            const wrap = document.createElement('div');
            wrap.className = 'item-container';
            wrap.dataset.id = s.id; // WICHTIG FÜR SORTIERUNG
            wrap.innerHTML = `
                <div class="item ${rank <= 3 ? 'rank-'+rank : ''}">
                    <div class="rank-num">${show.isRanked ? rank : '-'}</div>
                    <div class="flag-pure">${s.emoji}</div>
                    <div class="info">
                        <b>${s.country}</b>
                        <span>${s.name}</span>
                        <small>${s.song}</small>
                    </div>
                    ${pts ? `<div class="pts-badge">${pts}</div>` : ''}
                    <div class="artist-img-slot">${s.img ? `<img src="${s.img}">` : ''}</div>
                </div>`;
            wrap.onclick = () => editArtist(s.id);
            applyLongPress(wrap, () => { if(confirm('Artist löschen?')) deleteArtist(s.id); });
            list.appendChild(wrap);
        });
    }

    function deleteArtist(id) {
        let shows = JSON.parse(localStorage.getItem('esc_vFINAL'));
        const sIdx = shows.findIndex(s => s.id === currentShowId);
        shows[sIdx].songs = shows[sIdx].songs.filter(x => x.id !== id);
        localStorage.setItem('esc_vFINAL', JSON.stringify(shows));
        renderSongs();
    }

    function resetAlphabetical() {
        let shows = JSON.parse(localStorage.getItem('esc_vFINAL'));
        const sIdx = shows.findIndex(s => s.id === currentShowId);
        shows[sIdx].songs.sort((a,b) => a.country.localeCompare(b.country));
        shows[sIdx].isRanked = false;
        localStorage.setItem('esc_vFINAL', JSON.stringify(shows));
        renderSongs();
    }

    function saveComm() {
        let shows = JSON.parse(localStorage.getItem('esc_vFINAL'));
        const sIdx = shows.findIndex(s => s.id === currentShowId);
        const editId = document.getElementById('edit-comm-id').value;
        const data = {
            id: editId ? parseInt(editId) : Date.now(),
            country: document.getElementById('c-country').value,
            emoji: document.getElementById('c-emoji').value,
            pts: parseInt(document.getElementById('c-pts').value) || 0
        };
        if(editId) {
            const cIdx = shows[sIdx].community.findIndex(x => x.id == editId);
            shows[sIdx].community[cIdx] = data;
        } else {
            shows[sIdx].community.push(data);
        }
        localStorage.setItem('esc_vFINAL', JSON.stringify(shows));
        resetForm('view-community');
        renderComm();
    }

    function renderComm() {
        const list = document.getElementById('community-list');
        const show = JSON.parse(localStorage.getItem('esc_vFINAL')).find(s => s.id === currentShowId);
        list.innerHTML = '';
        show.community.sort((a,b) => b.pts - a.pts).forEach((c, i) => {
            const wrap = document.createElement('div');
            wrap.className = 'item-container';
            wrap.innerHTML = `
                <div class="item" style="height:75px; background:var(--blue-grad);">
                    <div class="rank-num">${i+1}</div>
                    <div class="flag-pure" style="font-size:24px;">${c.emoji}</div>
                    <div class="info"><b>${c.country}</b></div>
                    <div class="pts-badge" style="display:flex; border-radius:20px; width:auto; padding:0 12px; border-color:var(--gold-accent); color:white;">${c.pts.toLocaleString()}</div>
                </div>`;
            wrap.onclick = () => editComm(c.id);
            applyLongPress(wrap, () => { if(confirm('Löschen?')) { 
                let shows = JSON.parse(localStorage.getItem('esc_vFINAL'));
                const sIdx = shows.findIndex(s => s.id === currentShowId);
                shows[sIdx].community = shows[sIdx].community.filter(x => x.id !== c.id);
                localStorage.setItem('esc_vFINAL', JSON.stringify(shows));
                renderComm();
            }});
            list.appendChild(wrap);
        });
    }

    function editArtist(id) {
        const show = JSON.parse(localStorage.getItem('esc_vFINAL')).find(s => s.id === currentShowId);
        const s = show.songs.find(x => x.id === id);
        document.getElementById('edit-artist-id').value = s.id;
        document.getElementById('in-country').value = s.country;
        document.getElementById('in-emoji').value = s.emoji;
        document.getElementById('in-artist').value = s.name;
        document.getElementById('in-song').value = s.song;
    }

    function editComm(id) {
        const show = JSON.parse(localStorage.getItem('esc_vFINAL')).find(s => s.id === currentShowId);
        const c = show.community.find(x => x.id === id);
        document.getElementById('edit-comm-id').value = c.id;
        document.getElementById('c-country').value = c.country;
        document.getElementById('c-emoji').value = c.emoji;
        document.getElementById('c-pts').value = c.pts;
    }

    function resetForm(parentId) {
        if(parentId === 'artist-form') document.getElementById('edit-artist-id').value = '';
        if(parentId === 'view-community') document.getElementById('edit-comm-id').value = '';
        document.querySelectorAll(`#${parentId} input`).forEach(i => i.value = '');
    }

    // DER ENTSCHEIDENDE FIX: SORTIERUNG ÜBER DATA-ID
    new Sortable(document.getElementById('ranking-list'), {
        animation: 150,
        onEnd: function() {
            let shows = JSON.parse(localStorage.getItem('esc_vFINAL'));
            const sIdx = shows.findIndex(s => s.id === currentShowId);
            shows[sIdx].isRanked = true;
            
            // Hole alle IDs in der neuen DOM-Reihenfolge
            const newOrderIds = Array.from(document.querySelectorAll('#ranking-list .item-container'))
                                     .map(el => parseInt(el.dataset.id));
            
            // Baue die Liste basierend auf den IDs neu zusammen
            const reorderedSongs = newOrderIds.map(id => {
                return shows[sIdx].songs.find(song => song.id === id);
            }).filter(song => song !== undefined); // Sicherheitscheck
            
            shows[sIdx].songs = reorderedSongs;
            localStorage.setItem('esc_vFINAL', JSON.stringify(shows));
            renderSongs();
        }
    });

    renderShows();
</script>
</body>
</html>
