<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESC Scoreboard Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --esc-blue: #0a1931; --esc-gold: #c8a45e; --esc-gradient: linear-gradient(90deg, #0a1931 0%, #185adb 100%); }
        body { background-color: #050a18; color: white; font-family: 'Trebuchet MS', sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        .view { display: none; padding: 15px; flex-direction: column; align-items: center; }
        .active { display: flex; }
        
        .app-header { width: 100%; background: black; padding: 15px; border-bottom: 2px solid var(--esc-gold); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .user-banner { width: 100%; max-width: 500px; background: black; display: flex; align-items: center; padding: 10px; margin-bottom: 10px; clip-path: polygon(0 0, 100% 0, 93% 100%, 0% 100%); }
        .user-logo { width: 50px; height: 50px; background: #e60000; border-radius: 5px; font-weight: bold; font-size: 11px; display: flex; align-items: center; justify-content: center; text-align: center; margin-right: 15px; }

        #ranking-list, #final-list { list-style: none; padding: 0; width: 100%; max-width: 500px; }
        .item-container { position: relative; margin-bottom: 5px; }
        .item { background: var(--esc-gradient); display: flex; align-items: center; height: 85px; position: relative; z-index: 2; transition: transform 0.3s; border-radius: 2px; }
        .item.slid { transform: translateX(-80px); }
        .edit-btn-side { position: absolute; right: 0; top: 0; height: 100%; width: 80px; background: var(--esc-gold); color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 1; border-radius: 2px; }

        /* Top 3 Styling */
        .item-gold { background: linear-gradient(90deg, #c8a45e 0%, #0a1931 100%) !important; }
        .item-silver { background: linear-gradient(90deg, #a0a0a0 0%, #0a1931 100%) !important; }
        .item-bronze { background: linear-gradient(90deg, #cd7f32 0%, #0a1931 100%) !important; }

        .flag-diamond { width: 45px; height: 45px; margin-left: 10px; background: #333; transform: rotate(45deg); overflow: hidden; border: 2px solid #555; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .flag-diamond img { width: 140%; height: 140%; transform: rotate(-45deg); object-fit: cover; }
        
        .info { flex-grow: 1; margin-left: 20px; }
        .info b { text-transform: uppercase; font-size: 1.1rem; display: block; color: var(--esc-gold); }
        .info span { font-size: 0.9rem; opacity: 0.9; font-weight: bold; }
        
        .pts-circle { background: rgba(0,0,0,0.6); width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid var(--esc-gold); margin-right: 10px; color: var(--esc-gold); }
        
        .artist-slice { width: 100px; height: 100%; position: relative; clip-path: polygon(25% 0, 100% 0, 100% 100%, 0% 100%); background: black; overflow: hidden; }
        .artist-slice img { width: 100%; height: 100%; object-fit: cover; }
        .play-btn { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.1); color: white; text-decoration: none; font-size: 1.5rem; text-shadow: 0 0 5px black; }

        .btn-action { width: 100%; max-width: 500px; padding: 15px; border: none; color: white; font-weight: bold; border-radius: 30px; margin: 10px 0; cursor: pointer; text-transform: uppercase; }
        .btn-save { background: linear-gradient(to bottom, #7db343, #4a7a2a); border: 2px solid #999; }
        .btn-reset { background: #555; font-size: 0.8rem; padding: 10px; margin-bottom: 20px; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: black; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid var(--esc-gold); z-index: 100; }
    </style>
</head>
<body>

<div class="app-header">
    <button onclick="showView('view-shows')" style="background:none; border:none; color:white; font-size:1.5rem">☰</button>
    <div id="header-title">2026 Eurovision</div>
    <div style="width:30px"></div>
</div>

<div id="view-shows" class="view active">
    <div class="user-banner"><div class="user-logo">SIMON<br>ESC</div><b>Select Year</b></div>
    <div id="show-container" style="width:100%; max-width:500px;"></div>
</div>

<div id="view-ranking" class="view">
    <button class="btn-action btn-reset" onclick="resetRanking()">Reset to Alphabetical</button>
    <ul id="ranking-list"></ul>
    <button class="btn-action btn-save" onclick="finishTop()">Save My Top</button>
</div>

<div id="view-final" class="view">
    <div class="user-banner"><div class="user-logo">SIMON<br>ESC</div><b>SimonESC</b></div>
    <ul id="final-list"></ul>
    <button class="btn-action btn-save" onclick="showView('view-ranking')" style="background: #7db343">Edit My Top</button>
</div>

<div class="bottom-nav">
    <button onclick="showView('view-shows')" style="background:none; border:none; color:white;">YEARS</button>
    <button onclick="showView('view-ranking')" style="background:none; border:none; color:white;">MY TOP</button>
</div>

<script>
    let currentShowId = null;
    const ptsTable = [12, 10, 8, 7, 6, 5, 4, 3, 2, 1];

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'view-final') renderFinal();
    }

    // Beispiel Daten laden/erstellen
    function loadData() {
        let shows = JSON.parse(localStorage.getItem('esc_v6') || '[]');
        if(shows.length === 0) {
            shows = [{
                id: 1, name: "2026 Vienna", songs: [
                    { country: "Croatia", artist: "Baby Lasagna", img: "https://via.placeholder.com/100" },
                    { country: "Finland", artist: "Windows95man", img: "https://via.placeholder.com/100" },
                    { country: "Ukraine", artist: "Alyona & Jerry", img: "https://via.placeholder.com/100" },
                    { country: "Albania", artist: "Besa", img: "https://via.placeholder.com/100" }
                ]
            }];
            localStorage.setItem('esc_v6', JSON.stringify(shows));
        }
        renderShows();
    }

    function renderShows() {
        const container = document.getElementById('show-container');
        const shows = JSON.parse(localStorage.getItem('esc_v6'));
        container.innerHTML = '';
        shows.forEach(s => {
            container.innerHTML += `<div onclick="openShow(${s.id})" style="background:rgba(255,255,255,0.1); margin:10px; padding:20px; border-radius:10px;">${s.name}</div>`;
        });
    }

    function openShow(id) {
        currentShowId = id;
        renderSongs();
        showView('view-ranking');
    }

    // Alphabetischer Reset
    function resetRanking() {
        const shows = JSON.parse(localStorage.getItem('esc_v6'));
        const show = shows.find(s => s.id === currentShowId);
        show.songs.sort((a, b) => a.country.localeCompare(b.country));
        localStorage.setItem('esc_v6', JSON.stringify(shows));
        renderSongs();
    }

    function renderSongs() {
        const list = document.getElementById('ranking-list');
        const shows = JSON.parse(localStorage.getItem('esc_v6'));
        const show = shows.find(s => s.id === currentShowId);
        list.innerHTML = '';
        show.songs.forEach((s, i) => {
            const li = document.createElement('div');
            li.className = 'item-container';
            li.innerHTML = `
                <div class="edit-btn-side">EDIT</div>
                <div class="item">
                    <div class="flag-diamond"><img src="https://flagcdn.com/w160/${getCC(s.country)}.png"></div>
                    <div class="info"><b>${s.country}</b><span>${s.artist}</span></div>
                    <div class="artist-slice"><img src="${s.img}"><div class="play-btn">▶</div></div>
                </div>`;
            list.appendChild(li);
        });
    }

    function finishTop() {
        showView('view-final');
    }

    function renderFinal() {
        const list = document.getElementById('final-list');
        const shows = JSON.parse(localStorage.getItem('esc_v6'));
        const show = shows.find(s => s.id === currentShowId);
        list.innerHTML = '';
        show.songs.forEach((s, i) => {
            let topClass = i === 0 ? 'item-gold' : i === 1 ? 'item-silver' : i === 2 ? 'item-bronze' : '';
            list.innerHTML += `
                <div class="item ${topClass}" style="margin-bottom:5px">
                    <b style="width:30px; margin-left:10px">${i+1}</b>
                    <div class="flag-diamond" style="width:35px; height:35px; border:1px solid white"><img src="https://flagcdn.com/w160/${getCC(s.country)}.png"></div>
                    <div class="info"><b>${s.country}</b></div>
                    ${i < 10 ? `<div class="pts-circle">${ptsTable[i]}</div>` : ''}
                </div>`;
        });
    }

    function getCC(c) {
        const map = {"Croatia":"hr","Finland":"fi","Ukraine":"ua","Albania":"al","Germany":"de","Austria":"at"};
        return map[c] || "un";
    }

    new Sortable(document.getElementById('ranking-list'), {
        animation: 150,
        onEnd: () => {
            const shows = JSON.parse(localStorage.getItem('esc_v6'));
            const show = shows.find(s => s.id === currentShowId);
            const countries = Array.from(document.querySelectorAll('#ranking-list .info b')).map(b => b.innerText);
            show.songs.sort((a,b) => countries.indexOf(a.country.toUpperCase()) - countries.indexOf(b.country.toUpperCase()));
            localStorage.setItem('esc_v6', JSON.stringify(shows));
        }
    });

    loadData();
</script>
</body>
</html>
