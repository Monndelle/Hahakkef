<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESC Pro V2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --blue: linear-gradient(90deg, #0a1931 0%, #185adb 100%); --gold: #c8a45e; }
        body { background: #050a18; color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        .view { display: none; padding: 15px; flex-direction: column; align-items: center; }
        .active { display: flex; }
        .app-header { background: #000; padding: 15px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .show-item { width: 100%; max-width: 500px; background: var(--blue); margin: 5px 0; padding: 15px; border-radius: 5px; cursor: pointer; }
        .item-container { position: relative; margin-bottom: 8px; overflow: hidden; border-radius: 5px; background: var(--gold); }
        .edit-btn { position: absolute; right: 0; top: 0; height: 100%; width: 80px; background: var(--gold); color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .item { background: var(--blue); display: flex; align-items: center; height: 95px; position: relative; z-index: 2; transition: 0.3s; width: 100%; }
        .item.slid { transform: translateX(-80px); }
        .info { flex-grow: 1; margin-left: 15px; pointer-events: none; }
        .flag { width: 55px; height: 38px; margin-left: 10px; border: 1px solid #fff; object-fit: cover; }
        .artist-img { width: 100px; height: 100%; object-fit: cover; clip-path: polygon(25% 0, 100% 0, 100% 100%, 0% 100%); background: #000; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid var(--gold); }
        .input-panel { background: #111; padding: 15px; width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 8px; box-sizing: border-box; }
        input { padding: 10px; background: #222; color: #fff; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="app-header">
    <div style="font-weight:bold">SIMON ESC</div>
    <div id="header-title">Show Auswahl</div>
</div>

<div id="view-shows" class="view active">
    <div class="input-panel">
        <input type="text" id="new-show-name" placeholder="Name der neuen Show...">
        <button onclick="addShow()" style="background:var(--gold); padding:10px; border:none; font-weight:bold">Show erstellen</button>
    </div>
    <div id="show-container" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
</div>

<div id="view-ranking" class="view">
    <div class="input-panel">
        <input type="hidden" id="edit-id">
        <input type="text" id="in-country" placeholder="Land">
        <input type="text" id="in-artist" placeholder="Sänger">
        <input type="text" id="in-song" placeholder="Song Name">
        <input type="text" id="in-emoji" placeholder="Flagge als Emoji">
        <input type="file" id="file-img" accept="image/*">
        <button id="add-btn" onclick="saveItem()" style="background:var(--gold); padding:10px; border:none; font-weight:bold">Speichern</button>
    </div>
    <ul id="ranking-list" style="list-style:none; padding:0; width:100%; max-width:500px;"></ul>
</div>

<div id="view-community" class="view">
    <div id="community-list" style="width:100%; max-width:500px;"></div>
    <div class="input-panel">
        <input type="text" id="c-name" placeholder="Land">
        <input type="number" id="c-pts" placeholder="Punkte">
        <button onclick="addComm()" style="background:#185adb; color:white; padding:10px; border:none;">Eintragen</button>
    </div>
</div>

<div class="bottom-nav">
    <button onclick="showView('view-shows')" style="background:#185adb; color:white; border:none; padding:10px; border-radius:5px;">SHOWS</button>
    <button onclick="showView('view-ranking')" style="background:#4caf50; color:white; border:none; padding:10px; border-radius:5px;">MY TOP</button>
    <button onclick="showView('view-community')" style="background:#185adb; color:white; border:none; padding:10px; border-radius:5px;">COMMUNITY</button>
</div>

<script>
    let currentShowId = null;
    let startX = 0;

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'view-community') renderComm();
    }

    function addShow() {
        const name = document.getElementById('new-show-name').value;
        if(!name) return;
        const shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        shows.push({id: Date.now(), name, songs: [], community: []});
        localStorage.setItem('esc_v3', JSON.stringify(shows));
        renderShows();
    }

    function renderShows() {
        const container = document.getElementById('show-container');
        const shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        container.innerHTML = '';
        shows.forEach(s => {
            const div = document.createElement('div');
            div.className = 'show-item';
            div.innerHTML = `<b>⭐ ${s.name}</b>`;
            div.onclick = () => { currentShowId = s.id; renderSongs(); showView('view-ranking'); };
            container.appendChild(div);
        });
    }

    async function saveItem() {
        const editId = document.getElementById('edit-id').value;
        const imgFile = document.getElementById('file-img').files[0];
        let imgBase64 = null;
        if(imgFile) {
            imgBase64 = await new Promise(r => {
                const reader = new FileReader();
                reader.onload = () => r(reader.result);
                reader.readAsDataURL(imgFile);
            });
        }
        const shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        const show = shows.find(s => s.id === currentShowId);
        const songData = {
            id: editId ? parseInt(editId) : Date.now(),
            country: document.getElementById('in-country').value,
            artist: document.getElementById('in-artist').value,
            song: document.getElementById('in-song').value,
            emoji: document.getElementById('in-emoji').value,
            img: imgBase64 || (editId ? show.songs.find(s => s.id == editId).img : 'https://via.placeholder.com/110')
        };
        if(editId) {
            const idx = show.songs.findIndex(s => s.id == editId);
            show.songs[idx] = songData;
        } else {
            show.songs.push(songData);
        }
        localStorage.setItem('esc_v3', JSON.stringify(shows));
        document.querySelectorAll('.input-panel input').forEach(i => i.value = '');
        renderSongs();
    }

    function renderSongs() {
        const list = document.getElementById('ranking-list');
        const shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        const show = shows.find(s => s.id === currentShowId);
        list.innerHTML = '';
        show.songs.forEach((s, i) => {
            const container = document.createElement('div');
            container.className = 'item-container';
            container.innerHTML = `
                <div class="edit-btn" onclick="editSong(${s.id})">EDIT</div>
                <div class="item" ontouchstart="startX=event.touches[0].clientX" ontouchmove="if(startX-event.touches[0].clientX>30)this.classList.add('slid');if(startX-event.touches[0].clientX<-30)this.classList.remove('slid')">
                    <div style="font-size:2rem; margin:10px">${s.emoji || '🚩'}</div>
                    <div class="info"><b>${s.country}</b><br>${s.artist}<br><small>${s.song}</small></div>
                    <div class="artist-img"><img src="${s.img}" style="width:100%;height:100%;object-fit:cover"></div>
                </div>`;
            list.appendChild(container);
        });
    }

    function editSong(id) {
        const shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        const song = shows.find(s => s.id === currentShowId).songs.find(s => s.id === id);
        document.getElementById('edit-id').value = song.id;
        document.getElementById('in-country').value = song.country;
        document.getElementById('in-artist').value = song.artist;
        document.getElementById('in-song').value = song.song;
        document.getElementById('in-emoji').value = song.emoji;
        document.getElementById('add-btn').innerText = "Ändern";
        window.scrollTo(0,0);
    }

    function addComm() {
        const name = document.getElementById('c-name').value;
        const pts = document.getElementById('c-pts').value;
        const shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        const show = shows.find(s => s.id === currentShowId);
        show.community.push({name, pts: parseInt(pts)});
        localStorage.setItem('esc_v3', JSON.stringify(shows));
        renderComm();
    }

    function renderComm() {
        const container = document.getElementById('community-list');
        const shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
        const show = shows.find(s => s.id === currentShowId);
        container.innerHTML = '';
        if(show) show.community.sort((a,b)=>b.pts-a.pts).forEach((c,i)=> {
            container.innerHTML += `<div style="display:flex;padding:10px;background:#0a1931;border-bottom:1px solid #185adb"><b>${i+1}</b><span style="margin-left:15px;flex-grow:1">${c.name}</span><b>${c.pts}</b></div>`;
        });
    }

    new Sortable(document.getElementById('ranking-list'), {
        animation: 150,
        onEnd: () => {
            const shows = JSON.parse(localStorage.getItem('esc_v3') || '[]');
            const show = shows.find(s => s.id === currentShowId);
            const countries = Array.from(document.querySelectorAll('.item .info b')).map(b => b.innerText);
            show.songs.sort((a,b) => countries.indexOf(a.country.toUpperCase()) - countries.indexOf(b.country.toUpperCase()));
            localStorage.setItem('esc_v3', JSON.stringify(shows));
        }
    });

    renderShows();
</script>
</body>
</html>
